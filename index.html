<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<meta content="yes" name="apple-mobile-web-app-capable"/>
<meta content="black-translucent" name="apple-mobile-web-app-status-bar-style"/>
<title>End of Golems</title>
<style>
    :root {
      --bg: #101014;
      --panel: rgba(12, 13, 18, 0.92);
      --panel-2: rgba(18, 20, 28, 0.94);
      --line: #d8d8d8;
      --soft: #8f95a3;
      --accent: #f2f2f2;
      --danger: #ff6b6b;
      --heal: #8be28b;
      --warn: #ffd166;
      --poison: #7fd35d;
      --burn: #ff9f43;
      --buff: #6fb5ff;
      --debuff: #ff9dc2;
      --magic: #a98cff;
      --tech: #76e3cf;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; background: var(--bg); color: #f5f5f5; font-family: monospace; min-height: 100%; }
    body { padding: 8px; min-height: 100svh; background: radial-gradient(circle at top, rgba(78,86,110,0.18), transparent 34%), #0d0f14; }
    #app { width: min(1440px, calc(100vw - 16px)); aspect-ratio: 16 / 9; margin: 0 auto; position: relative; overflow: hidden; border-radius: 6px; background: #11151d; box-shadow: 0 18px 56px rgba(0,0,0,0.42); transition: box-shadow 160ms linear, filter 160ms linear; }
    #app::before { content: ''; position: absolute; inset: 6px; border: 1px solid rgba(255,255,255,0.07); pointer-events: none; z-index: 1; }
    #app.arena-citadel { box-shadow: 0 18px 56px rgba(0,0,0,0.45), 0 0 0 1px rgba(154, 173, 210, 0.16); }
    #app.arena-forge { box-shadow: 0 18px 56px rgba(0,0,0,0.45), 0 0 0 1px rgba(255, 160, 105, 0.18), 0 0 26px rgba(255,130,84,0.12); }
    #app.arena-swamp { box-shadow: 0 18px 56px rgba(0,0,0,0.45), 0 0 0 1px rgba(126, 194, 142, 0.18), 0 0 26px rgba(102,182,118,0.10); }
    #fxBackdrop { position: absolute; inset: 0; pointer-events: none; opacity: 0; transition: opacity 140ms linear; }
    #fxBackdrop::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at center, rgba(255,255,255,0.14), transparent 62%); }
    #app.fx-physical #fxBackdrop { opacity: 0.22; background: linear-gradient(90deg, rgba(255,140,110,0.16), transparent 45%, rgba(255,140,110,0.08)); }
    #app.fx-magic #fxBackdrop { opacity: 0.26; background: radial-gradient(circle at center, rgba(169,140,255,0.24), transparent 64%); }
    #app.fx-defense #fxBackdrop { opacity: 0.20; background: radial-gradient(circle at center, rgba(255,209,102,0.18), transparent 68%); }
    #app.fx-technique #fxBackdrop { opacity: 0.22; background: radial-gradient(circle at center, rgba(118,227,207,0.18), transparent 66%); }
    #app.fx-signature { box-shadow: 0 0 0 2px rgba(255,255,255,0.08), 0 0 26px rgba(255,255,255,0.12); }
    canvas {
      width: 100%; height: 100%; display: block;
      border: 4px solid var(--line);
      background: #161820;
      image-rendering: pixelated;
    }
    #overlay { position: absolute; inset: 0; pointer-events: none; z-index: 2; }
    #floatLayer { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 3; }
    #screenCurtain { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 4; opacity: 0; transition: opacity 150ms linear; }
    #screenCurtain::before { content: ''; position: absolute; inset: 0; background: rgba(8, 10, 16, 0.82); }
    #screenCurtain.show { opacity: 1; }
    #screenCurtainLabel { position: relative; z-index: 1; padding: 10px 18px; border: 2px solid var(--line); background: rgba(18, 20, 28, 0.9); color: #f6f6f6; font-size: 18px; letter-spacing: 0.08em; text-transform: uppercase; }
    #portraitLock { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; padding: 24px; background: radial-gradient(circle at top, rgba(42,56,88,0.35), rgba(8,10,16,0.96) 58%); z-index: 50; }
    #portraitLock.show { display: flex; }
    .portrait-lock-panel { width: min(100%, 420px); padding: 20px 18px; border: 3px solid var(--line); background: rgba(14, 16, 24, 0.94); box-shadow: 0 16px 40px rgba(0,0,0,0.35); text-align: center; }
    .portrait-lock-title { font-size: 22px; margin-bottom: 8px; }
    .portrait-lock-copy { font-size: 14px; color: var(--soft); line-height: 1.45; }
    .portrait-lock-icon { font-size: 34px; margin-bottom: 10px; }
    #screenCurtain.entry #screenCurtainLabel { border-color: var(--warn); color: var(--warn); }
    #screenCurtain.win #screenCurtainLabel { border-color: var(--heal); color: var(--heal); }
    #screenCurtain.lose #screenCurtainLabel { border-color: var(--danger); color: var(--danger); }
    .panel {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: 86%; max-width: 980px;
      background: linear-gradient(180deg, rgba(18,20,28,0.96), rgba(11,12,18,0.94));
      border: 3px solid var(--line);
      padding: 18px; pointer-events: auto;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.05) inset, 0 14px 40px rgba(0,0,0,0.24);
      animation: panelRise 160ms ease-out;
    }
    .panel.panel-select { width: 92%; max-width: 1160px; }
    .panel.panel-end { max-width: 920px; }
    .title { text-align: center; font-size: 34px; margin-bottom: 8px; }
    .subtitle { text-align: center; color: var(--soft); margin-bottom: 18px; }
    .stack { display: flex; flex-direction: column; gap: 10px; }
    .row { display: flex; gap: 12px; }
    .grow { flex: 1; }
    button {
      appearance: none; border: 2px solid var(--line); background: #20232c; color: #f3f3f3;
      font: inherit; padding: 10px 12px; cursor: pointer; min-height: 42px;
      text-align: left;
    }
    button:hover:not(:disabled), button:focus-visible:not(:disabled) { background: #2a2f3a; outline: none; }
    button:disabled { opacity: 0.45; cursor: default; }
    .char-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .selection-layout { display: grid; grid-template-columns: 1.15fr 0.95fr; gap: 16px; align-items: start; }
    .selection-layout.compact-layout { grid-template-columns: 1fr 1fr; }
    .selection-detail { border: 2px solid var(--line); background: rgba(255,255,255,0.03); padding: 14px; min-height: 100%; }
    .selection-detail.empty { display: flex; align-items: center; justify-content: center; color: var(--soft); }
    .selection-head { display: flex; justify-content: space-between; gap: 12px; align-items: center; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.12); }
    .small-title { font-size: 22px; margin-bottom: 2px; text-align: left; }
    .subtitle.compact { margin-bottom: 8px; text-align: left; }
    .screen-note.align-left { text-align: left; }
    .screen-note.strong-note { color: #d7dfed; }
    .selection-stats { margin-top: 10px; padding: 8px 10px; border: 1px solid rgba(255,255,255,0.16); background: rgba(255,255,255,0.03); font-size: 12px; }
    .selection-skills { margin-top: 12px; display: grid; gap: 8px; }
    .selection-skill { border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.03); padding: 8px 10px; border-left-width: 4px; }
    .selection-skill span { display: block; margin-top: 4px; font-size: 12px; color: var(--soft); }
    .compact-card { min-height: 0; }
    .identity-strip { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .identity-chip { display: inline-block; padding: 2px 6px; font-size: 10px; border: 1px solid rgba(255,255,255,0.2); color: #d7dce7; background: rgba(255,255,255,0.04); text-transform: uppercase; letter-spacing: .04em; }
    .sig-preview { display: inline-block; margin-top: 6px; font-size: 10px; color: #d9deea; }

    .char-card { background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03)); min-height: 156px; display: flex; flex-direction: column; justify-content: flex-start; gap: 5px; text-align: left; position: relative; overflow: hidden; }
    .char-card { transition: transform 120ms linear, border-color 120ms linear, box-shadow 120ms linear; }
    .char-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.18); }
    .char-card[data-char='axel'] { background: linear-gradient(180deg, rgba(141,45,45,0.20), rgba(255,255,255,0.03)); }
    .char-card[data-char='francois'] { background: linear-gradient(180deg, rgba(63,86,123,0.20), rgba(255,255,255,0.03)); }
    .char-card[data-char='jojo'] { background: linear-gradient(180deg, rgba(95,141,55,0.20), rgba(255,255,255,0.03)); }
    .char-card[data-char='polo'] { background: linear-gradient(180deg, rgba(86,113,143,0.22), rgba(255,255,255,0.03)); }
    .selection-detail { background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)); }
    .char-card.is-selected, .char-card:hover { border-color: var(--warn); }
    .char-card::before { content: ''; position: absolute; inset: 0 0 auto 0; height: 4px; background: rgba(255,255,255,0.14); }
    .char-card[data-char='axel']::before { background: #ff8a7a; }
    .char-card[data-char='francois']::before { background: #ff9dc2; }
    .char-card[data-char='jojo']::before { background: #7fd35d; }
    .char-card[data-char='polo']::before { background: #8ab8ff; }
    .char-card[data-char='nate']::before { background: #ffd166; }
    .char-card strong { font-size: 16px; }
    .small { font-size: 12px; color: var(--soft); }
    .battle-ui { position: absolute; inset: 0; pointer-events: none; }
    .hud-row {
      position: absolute; left: 18px; right: 18px; top: 18px;
      display: flex; justify-content: space-between; gap: 14px;
    }
    .hud {
      width: 214px; min-height: 98px; pointer-events: auto;
      background: var(--panel-2); border: 3px solid var(--line); padding: 8px 10px;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.05) inset;
    }
    .hud.active { border-color: var(--warn); box-shadow: 0 0 0 2px rgba(255,209,102,0.18) inset, 0 0 18px rgba(255,209,102,0.12); }
    .hud-title { display: flex; justify-content: space-between; gap: 10px; align-items: baseline; }
    .hud-name { font-size: 16px; }
    .hud-role { color: var(--soft); font-size: 12px; }
    .hud-gameplay { display:none; }
    .state-list { margin-top: 6px; display: grid; gap: 3px; }
    .state-line { font-size: 10px; color: #b9c0cb; }
    .turn-badge {
      display: inline-block; padding: 2px 6px; border: 1px solid var(--warn); color: var(--warn);
      font-size: 11px;
    }
    .hpbar {
      margin-top: 8px; height: 14px; border: 2px solid var(--line); background: #2b2f38; position: relative;
      overflow: hidden;
    }
    .hpfill { height: 100%; background: #f3f3f3; transition: width 180ms linear; }
    .hpfill.high { background: linear-gradient(90deg, #f3f3f3, #e9f6e9); }
    .hpfill.mid { background: linear-gradient(90deg, #ffd166, #ffe8a4); }
    .hpfill.low { background: linear-gradient(90deg, #ff6b6b, #ff9b9b); }
    .hud-meta { margin-top: 8px; display: flex; justify-content: space-between; gap: 8px; font-size: 12px; color: var(--soft); }
    .small.up { color: var(--heal); }
    .small.down { color: var(--danger); }
    .badges { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
    .badge {
      border: 1px solid var(--line); padding: 2px 6px; font-size: 11px; background: rgba(255,255,255,0.04);
    }
    .badge.poison { border-color: var(--poison); color: var(--poison); }
    .badge.burn { border-color: var(--burn); color: var(--burn); }
    .badge.buff { border-color: var(--buff); color: var(--buff); }
    .badge.debuff { border-color: var(--debuff); color: var(--debuff); }
    .badge.defense { border-color: var(--warn); color: var(--warn); }
    .badge.magic { border-color: var(--magic); color: var(--magic); }
    .badge.technique { border-color: var(--tech); color: var(--tech); }
    .hud.active .badge, .hud .badge.pulse { box-shadow: 0 0 0 1px rgba(255,255,255,0.08) inset, 0 0 8px rgba(255,255,255,0.07); }
    .battle-top-strip { display:none; }
    .turn-indicator { display:none; }
    .turn-indicator.enemy { border-color: var(--danger); color: var(--danger); }
    .scene-caption { display:none; }
    .scene-caption.physical { border-color: #ffb3a4; color: #ffd0c7; box-shadow: 0 0 12px rgba(255,179,164,0.16); }
    .scene-caption.magic { border-color: var(--magic); color: #ddd2ff; box-shadow: 0 0 12px rgba(169,140,255,0.18); }
    .scene-caption.defense { border-color: var(--warn); color: #ffe19a; box-shadow: 0 0 12px rgba(255,209,102,0.18); }
    .scene-caption.technique { border-color: var(--tech); color: #d5fff7; box-shadow: 0 0 12px rgba(118,227,207,0.18); }
    .scene-caption.signature { border-width: 2px; text-transform: uppercase; letter-spacing: 0.06em; }
    .log-box {
      position: absolute; left: 16px; bottom: 16px; right: 364px; min-height: 180px;
      display: grid; gap: 5px;
      background: var(--panel-2); border: 3px solid var(--line); padding: 10px 12px; pointer-events: auto;
      line-height: 1.35;
    }
    .cmd-box {
      position: absolute; width: 332px; right: 12px; bottom: 12px;
      background: var(--panel-2); border: 3px solid var(--line); padding: 8px; pointer-events: auto;
      transition: opacity 120ms linear, filter 120ms linear;
    }
    .cmd-box.locked { opacity: 0.78; filter: grayscale(0.15); }
    .cmd-title { margin-bottom: 6px; color: var(--soft); font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em; }
    .cmd-grid { display: grid; grid-template-columns: 1fr; gap: 6px; }
    .cmd-grid.action-grid { grid-template-columns: 1fr 1fr; }
    .cmd-grid.dual-grid { grid-template-columns: 1fr 1fr; }
    .cmd-grid.skill-list { grid-template-columns: 1fr; }
    .log-entry { font-size: 11px; color: #e2e7f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .log-entry:nth-child(odd) { color: #cfd5df; }
    .skill-card { min-height: 44px; border-width: 2px; padding: 6px 8px; }
    .skill-card.physical { border-color: rgba(255,179,164,0.65); }
    .skill-card.magic { border-color: rgba(169,140,255,0.68); box-shadow: inset 0 0 0 1px rgba(169,140,255,0.08); }
    .skill-card.defense { border-color: rgba(255,209,102,0.65); }
    .skill-card.technique { border-color: rgba(118,227,207,0.65); }
    .skill-card.signature-skill { background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.03)); }
    .skill-card.is-locked, .skill-card:disabled { opacity: 0.42; filter: grayscale(0.25); cursor: not-allowed; }
    .skill-card.is-locked .skill-name, .skill-card:disabled .skill-name { color: #aab2bf; }
    .skill-card .skill-name { font-size: 12px; display: flex; align-items: center; gap: 7px; }
    .skill-icon { display:inline-flex; align-items:center; justify-content:center; width:20px; min-width:20px; height:20px; border:1px solid rgba(255,255,255,0.16); border-radius:6px; background:rgba(255,255,255,0.06); font-size:12px; line-height:1; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04); }
    .skill-meta { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 2px; }
    .skill-desc { font-size: 11px; color: var(--soft); display: block; margin-top: 4px; }
    .skill-effect { display:none; }
    .family-badge, .signature-badge {
      display: inline-block; padding: 1px 5px; font-size: 9px; border: 1px solid var(--line);
      background: rgba(255,255,255,0.04); text-transform: uppercase; letter-spacing: .04em;
    }
    .family-badge.physical { border-color: #ffb3a4; color: #ffb3a4; }
    .family-badge.magic { border-color: var(--magic); color: var(--magic); }
    .family-badge.defense { border-color: var(--warn); color: var(--warn); }
    .family-badge.technique { border-color: var(--tech); color: var(--tech); }
    .family-badge.target { border-color: rgba(255,255,255,0.18); color: #d7dce7; }
    .selection-skill.physical { border-left-color: #ffb3a4; }
    .selection-skill.magic { border-left-color: var(--magic); }
    .selection-skill.defense { border-left-color: var(--warn); }
    .selection-skill.technique { border-left-color: var(--tech); }
    .signature-badge { border-color: var(--accent); color: var(--accent); }
    .sub-actions { margin-top: 8px; display: grid; gap: 8px; }
    .hint { margin-top: 4px; color: var(--soft); font-size: 10px; }
    .hint.strong { color: #dbe7ff; }
    .footer-actions { display: grid; gap: 8px; margin-top: 10px; }
    .float-text {
      position: absolute; font-weight: bold; transform: translate(-50%, -50%);
      text-shadow: 1px 1px 0 #000; animation: floatup 700ms ease-out forwards;
      white-space: nowrap;
    }
    .float-text.damage { color: var(--danger); }
    .float-text.physical { color: #ffb3a4; }
    .float-text.heal { color: var(--heal); }
    .float-text.status { color: var(--warn); }
    .float-text.defense { color: #ffe19a; }
    .float-text.poison { color: var(--poison); }
    .float-text.burn { color: var(--burn); }
    .float-text.magic { color: var(--magic); }
    .float-text.technique { color: var(--tech); }
    .float-text.signature { color: #f4f4f4; text-transform: uppercase; letter-spacing: 0.05em; }
    .float-text { display:inline-flex; align-items:center; gap:6px; }
    .float-icon { display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; border-radius:999px; border:1px solid rgba(255,255,255,0.18); background:rgba(10,12,18,0.38); font-size:11px; line-height:1; box-shadow: 0 0 8px rgba(0,0,0,0.18); }
    .screen-note { margin-top: 10px; text-align: center; color: var(--soft); font-size: 12px; }
    .panel.panel-map { max-width: 1200px; }
    .atlas-panel .subtitle { margin-bottom: 10px; }
    .atlas-route-head { margin-top: 6px; font-size: 12px; color: #d8dee8; }
    .atlas-board {
      position: relative; min-height: 660px; margin-top: 14px; padding: 22px 22px 118px;
      border: 2px solid rgba(255,255,255,0.12);
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,0.08), transparent 34%),
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      overflow: hidden;
    }
    .atlas-board::before {
      content: ''; position: absolute; inset: 14px; border: 1px solid rgba(255,255,255,0.08); pointer-events: none;
    }
    .atlas-grid {
      position: relative; z-index: 2; height: 100%; display: grid;
      grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
      grid-template-areas: 'frontiere pacte_social' 'laitues golems';
      align-items: stretch; justify-items: stretch; gap: 26px;
    }
    .atlas-node.clan-frontiere { grid-area: frontiere; }
    .atlas-node.clan-pacte_social { grid-area: pacte_social; }
    .atlas-node.clan-laitues { grid-area: laitues; }
    .atlas-node.clan-golems { grid-area: golems; }
    .atlas-node {
      position: relative; width: 100%; min-height: 224px; padding: 16px 18px 16px; border-radius: 20px;
      border: 1px solid color-mix(in srgb, var(--clan-accent), rgba(255,255,255,0.2) 40%);
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--clan-accent), rgba(255,255,255,0.05) 88%), rgba(15,18,24,0.92)),
        rgba(15,18,24,0.92);
      box-shadow: 0 12px 30px rgba(0,0,0,0.22), inset 0 0 0 1px rgba(255,255,255,0.04);
      text-align: left; overflow: hidden;
    }
    .atlas-node:hover:not(:disabled) { transform: translateY(-2px); border-color: var(--clan-accent); }
    .atlas-node:disabled { opacity: 0.78; }
    .atlas-node-sheen {
      position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.14), transparent 32%, transparent 68%, rgba(255,255,255,0.06));
      pointer-events: none;
    }
    .atlas-node-topline, .atlas-node-order, .map-title, .map-subtitle, .atlas-motto, .route-track, .atlas-terrain, .map-footer, .conquest-seal { position: relative; z-index: 1; }
    .atlas-node-topline { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
    .clan-emblem {
      display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px;
      border-radius: 999px; border: 1px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.07); font-size: 14px;
    }
    .atlas-node-order {
      position: absolute; top: 10px; right: 10px; width: 24px; height: 24px; border-radius: 999px;
      border: 1px solid var(--clan-accent); background: rgba(13,15,20,0.9); display: flex; align-items: center; justify-content: center; font-size: 11px;
    }
    .map-title { font-size: 19px; font-weight: 700; margin-top: 2px; }
    .map-subtitle { margin-top: 1px; }
    .atlas-motto { margin-top: 10px; font-size: 12px; color: #dce2ed; min-height: 42px; }
    .route-track { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    .encounter-rune {
      width: 24px; height: 24px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.05); font-size: 11px;
    }
    .encounter-rune.mob { color: #dce2ed; }
    .encounter-rune.boss { color: #ffd88b; border-color: rgba(255,216,139,0.55); }

window.cloneCombatant = function cloneCombatant(id) {
  const base = getCombatantDefinition(id);
  if (!base) throw new Error(`Combattant inconnu : ${id}`);
  return {

    currentHp: base.stats.hpMax,
    skills: [...base.skills],

window.createPersistentPlayerState = function createPersistentPlayerState(playerId) {
  const base = getCombatantDefinition(playerId);
  return {
    id: playerId,
    currentHp: base.stats.hpMax,
    potionCount: 2,
    statBonuses: { force: 0, agility: 0, intelligence: 0 },
    maxHpBonus: 0,
    simpleWins: 0,
    bossWins: 0
  };
};

window.getPersistentPlayerStats = function getPersistentPlayerStats(playerId, playerState = null) {
  const base = getCombatantDefinition(playerId);
  const bonuses = playerState?.statBonuses || {};
  return {
    hpMax: base.stats.hpMax + (playerState?.maxHpBonus || 0),
    force: base.stats.force + (bonuses.force || 0),
    agility: base.stats.agility + (bonuses.agility || 0),
    intelligence: base.stats.intelligence + (bonuses.intelligence || 0)
  };
};

window.createPlayerFromPersistentState = function createPlayerFromPersistentState(playerId, playerState = null) {
  const player = cloneCombatant(playerId);
  if (!playerState) return player;
  const persistentStats = getPersistentPlayerStats(playerId, playerState);
  player.stats = { ...player.stats, ...persistentStats };
  player.currentHp = Math.max(1, Math.min(player.stats.hpMax, playerState.currentHp ?? player.stats.hpMax));
  player.potionCount = Math.max(0, playerState.potionCount ?? player.potionCount);
  return player;
};

window.chooseArena = function chooseArena(playerId, enemyId) {
  const enemy = getCombatantDefinition(enemyId);
  if (enemy?.arena) return enemy.arena;
  if ([playerId, enemyId].includes('polo')) return 'forge';
  if ([playerId, enemyId].includes('jojo')) return 'swamp';
  return 'citadel';
};

window.applyEncounterScaling = function applyEncounterScaling(fighter, encounter = null) {
  if (!encounter) return fighter;
  const hpScale = encounter.hpScale || 1;
  const statScale = encounter.statScale || 1;
  fighter.stats.hpMax = Math.max(1, Math.round(fighter.stats.hpMax * hpScale));
  fighter.currentHp = fighter.stats.hpMax;
  fighter.stats.force = Math.max(1, Math.round(fighter.stats.force * statScale));
  fighter.stats.agility = Math.max(1, Math.round(fighter.stats.agility * statScale));
  fighter.stats.intelligence = Math.max(1, Math.round(fighter.stats.intelligence * statScale));
  return fighter;
};

window.createBattle = function createBattle(playerId, enemyId, options = {}) {
  const player = options.playerState
    ? createPlayerFromPersistentState(playerId, options.playerState)
    : cloneCombatant(playerId);
  const enemy = applyEncounterScaling(cloneCombatant(enemyId), options.encounter || null);
  const turnOwnerId = player.stats.agility === enemy.stats.agility
    ? (Math.random() < 0.5 ? player.id : enemy.id)
    : (player.stats.agility > enemy.stats.agility ? player.id : enemy.id);
  return {
    player,
    enemy,
    turnOwnerId,
    isEnded: false,
    winnerId: null,
    turnCount: 1,
    log: [options.logStart || 'Le combat commence.'],
    uiMode: 'main',
    arena: options.arena || chooseArena(playerId, enemyId),
    mode: options.mode || 'arena',
    campaignStage: options.campaignStage || null,
    campaignTotalStages: options.campaignTotalStages || null,
    encounterLabel: options.encounterLabel || enemy.name,
    isBossEncounter: Boolean(options.isBossEncounter || enemy.boss),
    campaignClanLabel: options.campaignClanLabel || '',
    campaignTier: options.campaignTier || 0
  };
};

window.shuffleList = function shuffleList(list) {
  const copy = [...list];
  for (let i = copy.length - 1; i > 0; i -= 1) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
};

window.getCampaignClanDefinition = function getCampaignClanDefinition(clanId) {
  return CAMPAIGN_CLANS[clanId] || CAMPAIGN_CLANS.frontiere;
};

window.makeCampaignEncounter = function makeCampaignEncounter(enemyId, stageIndex, config = {}) {
  const base = getCombatantDefinition(enemyId);
  const tierScale = CAMPAIGN_CLAN_SCALES[config.tier || 0] || CAMPAIGN_CLAN_SCALES[0];
  const bossBoost = config.isBoss || base.boss ? CAMPAIGN_GLOBAL_SCALE.bossBonus : 0;
  return {
    enemyId,
    label: config.label || base.name,
    isBoss: Boolean(config.isBoss ?? base.boss),
    clan: config.clan || 'frontiere',
    clanLabel: config.clanLabel || 'Frontière sauvage',
    tier: config.tier || 0,
    hpScale: (config.hpScale || (tierScale.hp + bossBoost)) * CAMPAIGN_GLOBAL_SCALE.hp,
    statScale: (config.statScale || (tierScale.stats + bossBoost * 0.5)) * CAMPAIGN_GLOBAL_SCALE.stats,
    intro: config.isBoss || base.boss
      ? `Boss ${stageIndex + 1} : ${config.label || base.name}`
      : `Rencontre ${stageIndex + 1} : ${config.label || base.name}`
  };
};

window.buildCampaignClanEncounters = function buildCampaignClanEncounters(clanId, stageOffset = 0) {
  const clan = getCampaignClanDefinition(clanId);
  if (clanId === 'frontiere') {
    const normals = shuffleList(CAMPAIGN_NORMAL_POOL).slice(0, 3);
    const bosses = shuffleList(CAMPAIGN_BOSS_POOL).slice(0, 2);
    const act = [normals[0], normals[1], bosses[0], normals[2], bosses[1]];
    return act.map((enemyId, index) => makeCampaignEncounter(enemyId, stageOffset + index, {
      tier: clan.tier,
      clan: clan.id,
      clanLabel: clan.label,
      isBoss: Boolean(getCombatantDefinition(enemyId).boss)
    }));
  }
  if (clanId === 'pacte_social') {
    const act = ['nicolas', 'fat_i_ma', 'bernard_chantal', 'livreur_marron', 'ours_saf'];
    return act.map((enemyId, index) => makeCampaignEncounter(enemyId, stageOffset + index, {
      tier: clan.tier,
      clan: clan.id,
      clanLabel: clan.label,
      isBoss: enemyId === 'ours_saf'
    }));
  }
  if (clanId === 'laitues') {
    const act = ['batavia_fauve', 'salade_ronceuse', 'batavia_fauve', 'salade_ronceuse', 'grande_tapee'];
    return act.map((enemyId, index) => makeCampaignEncounter(enemyId, stageOffset + index, {
      tier: clan.tier,
      clan: clan.id,
      clanLabel: clan.label,
      isBoss: enemyId === 'grande_tapee'
    }));
  }
  const act = ['golem_optique', 'golem_scrutateur', 'golem_civique', 'golem_optique', 'golem_central'];
  return act.map((enemyId, index) => makeCampaignEncounter(enemyId, stageOffset + index, {
    tier: clan.tier,
    clan: clan.id,
    clanLabel: clan.label,
    isBoss: enemyId === 'golem_central'
  }));
};

window.buildCampaignPath = function buildCampaignPath(order = ['frontiere', 'pacte_social', 'laitues', 'golems']) {
  let stageOffset = 0;
  return order.flatMap(clanId => {
    const encounters = buildCampaignClanEncounters(clanId, stageOffset);
    stageOffset += encounters.length;
    return encounters;
  });
};

window.startCampaign = function startCampaign(selectedId) {
  const clanIds = ['frontiere', 'pacte_social', 'laitues', 'golems'];
  appState.selectedId = selectedId;
  appState.gameMode = 'campaign';
  appState.campaign = {
    playerId: selectedId,
    clans: {
      frontiere: buildCampaignClanEncounters('frontiere', 0),

    },

    currentClanId: null,
    currentClanStageIndex: 0,
    globalStageIndex: 0,

window.chooseCampaignClan = function chooseCampaignClan(clanId) {
  const campaign = appState.campaign;
  if (!campaign || campaign.completed || campaign.failed) return;
  if (campaign.currentClanId || !campaign.remainingClanIds.includes(clanId)) return;
  campaign.currentClanId = clanId;
  campaign.currentClanStageIndex = 0;
  campaign.remainingClanIds = campaign.remainingClanIds.filter(id => id !== clanId);
  campaign.clanOrder.push(clanId);
  startCampaignBattle();
};

window.startCampaignBattle = function startCampaignBattle() {
  const campaign = appState.campaign;
  if (!campaign || !campaign.currentClanId) return;
  const clanEncounters = campaign.clans[campaign.currentClanId] || [];
  const encounter = clanEncounters[campaign.currentClanStageIndex];
  if (!encounter) {
    campaign.currentClanId = null;
    advanceCampaign();
    return;
  }
  appState.battle = createBattle(campaign.playerId, encounter.enemyId, {
    mode: 'campaign',
    playerState: campaign.playerState,
    encounter,
    campaignStage: campaign.globalStageIndex + 1,
    campaignTotalStages: campaign.totalStages,
    campaignClanLabel: encounter.clanLabel,
    campaignTier: encounter.tier,
    encounterLabel: encounter.label,
    isBossEncounter: encounter.isBoss,
    logStart: encounter.isBoss
      ? `Le boss ${encounter.label} surgit.`
      : `${encounter.label} entre dans l'arène.`
  });
  appState.screen = 'battle';
  appState.busy = false;
  appState.fx.sceneCaption = encounter.isBoss
    ? `Boss : ${encounter.label}`
    : `${encounter.clanLabel} — ${campaign.globalStageIndex + 1}/${campaign.totalStages}`;
  appState.fx.turnBanner = '';
  render();
  if (appState.battle.turnOwnerId === appState.battle.enemy.id) enemyTurn();
};

window.advanceCampaign = function advanceCampaign() {
  if (!appState.campaign) return;
  if (appState.campaign.completed || appState.campaign.failed) {
    appState.screen = 'title';
    render();
    return;
  }
  if (!appState.campaign.currentClanId) {
    openCampaignMap();
    return;
  }
  startCampaignBattle();
};

window.exitToTitle = function exitToTitle() {
  appState.screen = 'title';
  appState.battle = null;
  appState.campaign = null;
  appState.busy = false;
  appState.fx.sceneCaption = '';
  appState.fx.turnBanner = '';
  render();
};

  };

window.enemyIdFor = function enemyIdFor(playerId) {
  const ids = Object.keys(CHARACTERS).filter(id => id !== playerId && id !== 'nate');
  return ids[Math.floor(Math.random() * ids.length)];
};

window.findWhichFighter = function findWhichFighter(id) {
  return appState.battle.player.id === id ? 'player' : 'enemy';
};

window.isDead = function isDead(fighter) {
  return fighter.currentHp <= 0;
};

window.hpPct = function hpPct(fighter) {
  return Math.max(0, Math.min(100, Math.round((fighter.currentHp / fighter.stats.hpMax) * 100)));
};

window.fighterPosition = function fighterPosition(which) {
  const portraitMobile = Boolean(window.MOBILE_VIEW);
  const w = canvas?.width || 1280;
  const h = canvas?.height || 720;
  if (portraitMobile) {
    return which === 'player' ? { x: Math.round(w * 0.30), y: Math.round(h * 0.43) } : { x: Math.round(w * 0.70), y: Math.round(h * 0.40) };
  }
  return which === 'player' ? { x: 300, y: 306 } : { x: 720, y: 286 };
};

window.delay = function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
};

window.applyFxChrome = function applyFxChrome() {
  const app = document.getElementById('app');
  if (!app) return;
  app.classList?.remove?.('fx-physical', 'fx-magic', 'fx-defense', 'fx-technique', 'fx-signature');
  if (appState.fx.familyPulse) app.classList?.add?.(`fx-${appState.fx.familyPulse}`);
  if (appState.fx.signaturePulse) app.classList?.add?.('fx-signature');
};

window.sumTimedEffects = function sumTimedEffects(fighter, stat, bucket) {
  return (fighter[bucket] || []).reduce((sum, effect) => effect.stat === stat ? sum + effect.value : sum, 0);
};

window.getEffectiveStat = function getEffectiveStat(fighter, stat) {
  const buffTotal = sumTimedEffects(fighter, stat, 'buffs');
  const debuffTotal = sumTimedEffects(fighter, stat, 'debuffs');
  return Math.max(1, fighter.stats[stat] + buffTotal + debuffTotal);
};

window.getStatDelta = function getStatDelta(fighter, stat) {
  return getEffectiveStat(fighter, stat) - fighter.stats[stat];
};

window.pushLog = function pushLog(message) {
  if (!appState.battle) return;
  appState.battle.log.push(message);
  if (appState.battle.log.length > 40) appState.battle.log.shift();
};

<script>

window.STATUS_EFFECTS = {
  poison: { id: 'poison', name: 'Poison', duration: 4, stackable: true, maxStacks: 2, family: 'technique' },
  burn: { id: 'burn', name: 'Brûlure', duration: 3, stackable: false, family: 'magic' },
  fragile: { id: 'fragile', name: 'Fragilité', duration: 3, stackable: false, family: 'technique' },
  charge: { id: 'charge', name: 'Charge', duration: 3, stackable: false, family: 'technique' },
  guard: { id: 'guard', name: 'Garde', duration: 1, stackable: false, family: 'defense' },
  evade_next: { id: 'evade_next', name: 'Vapeur', duration: 1, stackable: false, family: 'magic' },
  reflect_next: { id: 'reflect_next', name: 'Polyglotte', duration: 1, stackable: false, family: 'technique' },
  drunk: { id: 'drunk', name: 'Ivresse', duration: 1, stackable: false, family: 'technique' },
  replacement_countdown: { id: 'replacement_countdown', name: 'Grand remplacement', duration: 9, stackable: false, family: 'technique' },
  tasty_mark: { id: 'tasty_mark', name: 'Tasty crousty', duration: 2, stackable: false, family: 'technique' }
};

window.StatusSystem = {
  createStatus(statusId, payload = {}) {
    const base = STATUS_EFFECTS[statusId] || { id: statusId, name: statusId, duration: 1, stackable: false, family: payload.family || 'technique' };
    return {
      id: base.id,
      name: payload.name || base.name,
      duration: payload.duration ?? base.duration,
      stacks: payload.stacks ?? 1,
      skipTickOnce: payload.skipTickOnce ?? true,
      value: payload.value,
      family: payload.family || base.family,
      shortLabel: payload.shortLabel || null,
      meta: payload.meta || null
    };
  },

  createTimedModifier(effect, kind = 'buff') {
    return {
      stat: effect.stat,
      value: effect.value,
      duration: effect.duration,
      skipTickOnce: effect.skipTickOnce ?? true,
      label: effect.label || effect.stat,
      shortLabel: effect.shortLabel || effect.label || effect.stat,
      statusId: effect.statusId || `${effect.stat}_${kind}`,
      family: effect.family || (kind === 'buff' ? 'technique' : 'debuff'),
      kind
    };
  },

  addTimedModifier(target, effect, kind = 'buff') {
    const bucket = kind === 'buff' ? 'buffs' : 'debuffs';
    const next = this.createTimedModifier(effect, kind);
    const existing = target[bucket].find(entry => entry.statusId === next.statusId);
    if (existing) {
      existing.value = next.value;
      existing.duration = next.duration;
      existing.skipTickOnce = next.skipTickOnce;
      existing.label = next.label;
      existing.shortLabel = next.shortLabel;
      existing.family = next.family;
      return existing;
    }
    target[bucket].push(next);
    return next;
  },

  hasTimedModifier(target, statusId, kind = null) {
    const pools = kind ? [kind === 'buff' ? target.buffs : target.debuffs] : [target.buffs, target.debuffs];
    return pools.some(pool => pool.some(entry => entry.statusId === statusId));
  },

  addOrRefreshStatus(target, statusId, payload = {}) {
    let status = target.states.find(s => s.id === statusId);
    if (statusId === 'poison') {
      if (status) {
        status.stacks = Math.min(STATUS_EFFECTS.poison.maxStacks, status.stacks + 1);
        status.duration = payload.duration ?? STATUS_EFFECTS.poison.duration;
        status.value = payload.value ?? status.value ?? BALANCE.poisonTick;
        status.skipTickOnce = false;
      } else {
        target.states.push(this.createStatus(statusId, {
          ...payload,
          stacks: 1,
          duration: payload.duration ?? STATUS_EFFECTS.poison.duration,
          value: payload.value ?? BALANCE.poisonTick,
          skipTickOnce: true
        }));
      }
      return;
    }

    if (statusId === 'burn') {
      if (status) {
        status.duration = payload.duration ?? STATUS_EFFECTS.burn.duration;
        status.value = payload.value ?? status.value ?? BALANCE.burnTick;
        status.skipTickOnce = false;
      } else {
        target.states.push(this.createStatus(statusId, {
          ...payload,
          duration: payload.duration ?? STATUS_EFFECTS.burn.duration,
          value: payload.value ?? BALANCE.burnTick,
          skipTickOnce: true
        }));
      }
      return;
    }

    if (status) {
      status.duration = payload.duration ?? status.duration;
      status.value = payload.value ?? status.value;
      status.skipTickOnce = payload.skipTickOnce ?? true;
      status.family = payload.family || status.family;
      status.shortLabel = payload.shortLabel ?? status.shortLabel;
      return;
    }

    target.states.push(this.createStatus(statusId, payload));
  },

  hasStatus(target, statusId) {
    return target.states.some(s => s.id === statusId);
  },

  getStatus(target, statusId) {
    return target.states.find(s => s.id === statusId);
  },

  removeStatus(target, statusId) {
    target.states = target.states.filter(s => s.id !== statusId);
  },

  consumeStatus(target, statusId) {
    const status = this.getStatus(target, statusId);
    if (!status) return null;
    this.removeStatus(target, statusId);
    return status;
  },

  tickDurationsForTurnOwner(fighter, events, fighterSide) {
    const tickTimedPool = (pool, kind) => pool
      .map(effect => ({ ...effect, duration: effect.skipTickOnce ? effect.duration : effect.duration - 1, skipTickOnce: false }))
      .filter(effect => {
        if (effect.duration > 0) return true;
        if (events) {
          events.push({
            type: 'STATUS_EXPIRE',
            targetId: fighter.id,
            targetSide: fighterSide,
            statusId: effect.statusId,
            family: effect.family,
            label: `${effect.label} dissipé`,
            caption: 'Effet dissipé',
            message: `${effect.label} quitte ${fighter.name}.`
          });
        }
        return false;
      });

    fighter.buffs = tickTimedPool(fighter.buffs, 'buff');
    fighter.debuffs = tickTimedPool(fighter.debuffs, 'debuff');

    const nextStates = [];
    for (const state of fighter.states) {
      if (state.id === 'replacement_countdown') {
        nextStates.push(state);
        continue;
      }
      if (state.skipTickOnce) {
        nextStates.push({ ...state, skipTickOnce: false });
        continue;
      }
      const nextDuration = state.duration - 1;
      if (nextDuration > 0) {
        nextStates.push({ ...state, duration: nextDuration });
      } else if (events) {
        events.push({
          type: 'STATUS_EXPIRE',
          targetId: fighter.id,
          targetSide: fighterSide,
          statusId: state.id,
          family: state.family,
          label: `${state.name} dissipé`,
          caption: 'État dissipé',
          message: `${state.name} quitte ${fighter.name}.`
        });
      }
    }
    fighter.states = nextStates;
  },

  applyEndTurnEffects(fighter, events, fighterSide) {
    const poison = this.getStatus(fighter, 'poison');
    if (poison) {
      if (poison.skipTickOnce) {
        poison.skipTickOnce = false;
      } else {
        const damage = poison.stacks * (poison.value || BALANCE.poisonTick);
        fighter.currentHp = Math.max(0, fighter.currentHp - damage);
        events.push({
          type: 'STATUS_TICK',
          targetId: fighter.id,
          targetSide: fighterSide,
          statusId: 'poison',
          label: `Poison ${damage}`,
          value: damage,
          family: 'technique',
          caption: 'Poison',
          message: `${fighter.name} subit ${damage} dégâts de poison.`
        });
      }
    }

    const burn = this.getStatus(fighter, 'burn');
    if (burn) {
      if (burn.skipTickOnce) {
        burn.skipTickOnce = false;
      } else {
        const damage = burn.value || BALANCE.burnTick;
        fighter.currentHp = Math.max(0, fighter.currentHp - damage);
        events.push({
          type: 'STATUS_TICK',
          targetId: fighter.id,
          targetSide: fighterSide,
          statusId: 'burn',
          label: `Brûlure ${damage}`,
          value: damage,
          family: 'magic',
          caption: 'Brûlure',
          message: `${fighter.name} subit ${damage} dégâts de brûlure.`
        });
      }
    }
  }
};

<script>


window.getFamilyFloatIcon = function getFamilyFloatIcon(family, kind = '') {
  if (kind === 'heal') return '✚';
  if (kind === 'status') return '◌';
  if (kind === 'signature') return '✹';
  if (family === 'physical') return '⚔';
  if (family === 'magic') return '✦';
  if (family === 'defense') return '🛡';
  if (family === 'technique') return '✧';
  if (family === 'poison') return '☠';
  if (family === 'burn') return '🔥';
  return '•';
};

window.getSkillIcon = function getSkillIcon(skillId, skill = null) {
  const id = String(skillId || '').toLowerCase();
  const fam = skill?.family || '';
  if (id.includes('potion') || id.includes('alchimie') || id.includes('flunch')) return '🧪';
  if (id.includes('mimi')) return '🍷';
  if (id.includes('transfert') || id.includes('osmoze') || id.includes('siphon') || id.includes('dette') || id.includes('cafterie') || id.includes('bulletin')) return '✦';
  if (id.includes('laser') || id.includes('rayon')) return '◈';
  if (id.includes('feu') || id.includes('burn') || id.includes('listerine') || id.includes('infernal')) return '🔥';
  if (id.includes('poison') || id.includes('tox') || id.includes('acide')) return '☠';
  if (id.includes('racines') || id.includes('epines') || id.includes('trognon') || id.includes('lettuce')) return '🌿';
  if (id.includes('polyglotte')) return '🔁';
  if (id.includes('vapeur')) return '♨';
  if (id.includes('nate') || id.includes('ce_n_est_pas_fini') || id.includes('transformation')) return '👹';
  if (id.includes('dice') || id.includes('des')) return '🎲';
  if (id.includes('voile') || id.includes('carapace') || id.includes('cape') || id.includes('defend') || id.includes('embarquement')) return '🛡';
  if (id.includes('attaque') || id.includes('coup') || id.includes('griffe') || id.includes('marteau') || id.includes('crocs') || id.includes('ecrasement') || id.includes('charge') || id.includes('lance') || id.includes('tapee') || id.includes('acheter')) return '⚔';
  if (fam === 'physical') return '⚔';
  if (fam === 'magic') return '✦';
  if (fam === 'defense') return '🛡';
  if (fam === 'technique') return '✧';
  return '•';
};

window.addFloat = function addFloat(x, y, text, cls, icon = '') {
  const el = document.createElement('div');
  el.className = `float-text ${cls}`;
  el.style.left = `${x}px`;
  el.style.top = `${y}px`;
  if (icon) {
    const iconSpan = document.createElement('span');
    iconSpan.className = 'float-icon';
    iconSpan.textContent = icon;
    el.appendChild(iconSpan);
  }
  const textSpan = document.createElement('span');
  textSpan.textContent = text;
  el.appendChild(textSpan);
  floatLayer.appendChild(el);
  setTimeout(() => el.remove(), 740);
};

window.setFamilyPulse = function setFamilyPulse(family = '', signature = false) {
  appState.fx.familyPulse = family || '';
  appState.fx.signaturePulse = Boolean(signature);
  applyFxChrome();
};

window.clearFamilyPulse = function clearFamilyPulse() {
  appState.fx.familyPulse = '';
  appState.fx.signaturePulse = false;
  applyFxChrome();
};

window.FeedbackSystem = {
  async playEventSequence(events) {
    appState.busy = true;
    render();

    for (const ev of events) {
      if (ev.type === 'TURN_CHANGED') {
        clearFamilyPulse();
        appState.fx.turnBanner = '';
        render();
        await delay(320);
        continue;
      }

      if (ev.type === 'ACTION_STARTED') {
        appState.fx.actionActor = ev.actorId;
        appState.fx.sceneCaption = ev.caption || ev.message;
        setFamilyPulse(ev.family, ev.signature);
        if (ev.signature) {
          const pos = fighterPosition(ev.actorSide);
          addFloat(pos.x, pos.y - 122, ev.signatureText || ev.skillName || 'Signature', 'signature', getFamilyFloatIcon(ev.family, 'signature'));
        }
        pushLog(ev.message);
        render();
        await delay(ev.signature ? 320 : 260);
        continue;
      }

      if (ev.type === 'EVADED') {
        setFamilyPulse('defense', false);
        const pos = fighterPosition(ev.targetSide);
        addFloat(pos.x, pos.y - 80, 'Esquive !', 'defense', getFamilyFloatIcon('defense', 'status'));
        pushLog('Esquive !');
        appState.fx.pulsedStatus = ev.targetId;
        appState.fx.sceneCaption = 'Évitement instantané';
        render();
        await delay(340);
        appState.fx.pulsedStatus = null;
        continue;
      }

      if (ev.type === 'DEFEND_SET') {
        setFamilyPulse('defense', false);
        const pos = fighterPosition(ev.actorSide);
        addFloat(pos.x, pos.y - 80, 'Garde', 'defense', getFamilyFloatIcon('defense', 'status'));
        pushLog(ev.message);
        appState.fx.sceneCaption = 'Posture défensive';
        render();
        await delay(260);
        continue;
      }

      if (ev.type === 'DAMAGE') {
        setFamilyPulse(ev.family || 'physical', false);
        appState.fx.flash = ev.targetId;
        appState.fx.shake = ev.targetId;
        const pos = fighterPosition(ev.targetSide);
        const cls = ev.family === 'magic' ? 'magic' : ev.family === 'technique' ? 'technique' : ev.family === 'defense' ? 'defense' : 'physical';
        addFloat(pos.x, pos.y - 90, `-${ev.value}`, cls, getFamilyFloatIcon(ev.family || cls));
        if (ev.critical) addFloat(pos.x, pos.y - 120, 'Critique !', 'status', '✹');
        pushLog(ev.message);
        appState.fx.sceneCaption = ev.caption || (ev.family === 'magic' ? 'Impact arcanique' : ev.family === 'technique' ? 'Impact technique' : 'Impact direct');
        render();
        await delay(420);
        appState.fx.flash = null;
        appState.fx.shake = null;
        continue;
      }

      if (ev.type === 'HEAL') {
        setFamilyPulse('technique', false);
        const pos = fighterPosition(ev.targetSide);
        addFloat(pos.x, pos.y - 90, `+${ev.value}`, 'heal', getFamilyFloatIcon('', 'heal'));
        pushLog(ev.message);
        appState.fx.sceneCaption = ev.caption || 'Récupération';
        render();
        await delay(320);
        continue;
      }

      if (ev.type === 'STATUS' || ev.type === 'STATUS_TICK' || ev.type === 'STATUS_EXPIRE') {
        setFamilyPulse(ev.family || 'technique', false);
        const pos = fighterPosition(ev.targetSide);
        const cls = ev.statusId === 'poison' ? 'poison' : ev.statusId === 'burn' ? 'burn' : ev.family === 'magic' ? 'magic' : (ev.family === 'technique' ? 'technique' : ev.family === 'defense' ? 'defense' : 'status');
        addFloat(pos.x, pos.y - 110, ev.label, cls, getFamilyFloatIcon(ev.family || cls, 'status'));
        pushLog(ev.message);
        appState.fx.sceneCaption = ev.caption || ev.label || ev.message;
        appState.fx.pulsedStatus = ev.targetId;
        render();
        await delay(280);
        appState.fx.pulsedStatus = null;
        continue;
      }

      if (ev.type === 'TRANSFORM') {
        setFamilyPulse('technique', true);
        appState.fx.flash = ev.actorId;
        const pos = fighterPosition(ev.actorSide);
        addFloat(pos.x, pos.y - 100, 'NATE', 'signature', '👹');
        pushLog(ev.message);
        appState.fx.sceneCaption = 'Rupture démoniaque';
        render();
        await delay(640);
        appState.fx.flash = null;
        continue;
      }

      if (ev.type === 'INFO' || ev.type === 'BATTLE_ENDED') {
        pushLog(ev.message);
        appState.fx.sceneCaption = ev.message;
        render();
        await delay(240);
      }
    }

    appState.fx.actionActor = null;
    appState.fx.turnBanner = '';
    clearFamilyPulse();
    appState.busy = false;
    render();

    if (appState.screen === 'battle' && !appState.battle.isEnded && appState.battle.turnOwnerId === appState.battle.enemy.id) {
      enemyTurn();
    }
  }
};


</script>
<script>

window.badgesFor = function badgesFor(fighter) {
  const badges = [];
  const pushStateBadge = (statusId, text, cls) => {
    const status = StatusSystem.getStatus(fighter, statusId);
    if (!status) return;
    const turns = status.duration ? ` ${status.duration}t` : '';
    const stacks = status.stacks > 1 ? ` x${status.stacks}` : '';
    badges.push({ text: `${text}${stacks}${turns}`, cls, detail: statusDetailText(statusId, status) });
  };

  pushStateBadge('guard', 'Garde', 'defense');
  pushStateBadge('poison', 'Poison', 'poison');
  pushStateBadge('burn', 'Brûlure', 'burn');
  pushStateBadge('fragile', 'Fragilité', 'debuff');
  pushStateBadge('charge', 'Charge', 'buff');
  pushStateBadge('evade_next', 'Vapeur', 'magic');
  pushStateBadge('reflect_next', 'Polyglotte', 'technique');
  pushStateBadge('drunk', 'Ivresse', 'technique');
  pushStateBadge('replacement_countdown', 'Remplacement', 'technique');
  pushStateBadge('tasty_mark', 'Tasty x2', 'technique');

  fighter.buffs.forEach(effect => badges.push({
    text: `${effect.shortLabel || effect.label} ${effect.duration}t`,
    cls: effect.family === 'magic' ? 'magic' : effect.family === 'defense' ? 'defense' : 'buff',
    detail: `${effect.label} : ${effect.value > 0 ? '+' : ''}${effect.value} ${statLabel(effect.stat)}.`
  }));
  fighter.debuffs.forEach(effect => badges.push({
    text: `${effect.shortLabel || effect.label} ${effect.duration}t`,
    cls: effect.family === 'magic' ? 'magic' : 'debuff',
    detail: `${effect.label} : ${effect.value > 0 ? '+' : ''}${effect.value} ${statLabel(effect.stat)}.`
  }));

  return badges.length ? badges : [{ text: 'Aucun', cls: '', detail: 'Aucun effet actif.' }];
};

window.statusDetailText = function statusDetailText(statusId, status) {
  switch (statusId) {
    case 'guard': return 'Réduit les dégâts de la prochaine attaque subie.';
    case 'poison': return `Inflige ${status.stacks * (status.value || BALANCE.poisonTick)} dégâts en fin de tour.`;
    case 'burn': return `Inflige ${status.value || BALANCE.burnTick} dégâts en fin de tour.`;
    case 'fragile': return 'Amplifie la prochaine attaque reçue.';
    case 'charge': return 'Renforce la prochaine compétence offensive.';
    case 'evade_next': return 'Esquive automatiquement la prochaine attaque reçue.';
    case 'reflect_next': return 'A 50% de chances de renvoyer les dégâts de la prochaine attaque adverse sur son auteur.';
    case 'drunk': return 'Réduit de 20% les chances de toucher avec les attaques pendant 1 tour.';
    case 'replacement_countdown': return `Victoire automatique au bout de ${status.duration} tours.`;
    case 'tasty_mark': return 'Les dégâts reçus au prochain impact sont doublés.';
    default: return status?.name || 'Effet actif';
  }
};

window.statLabel = function statLabel(statKey) {
  if (statKey === 'force') return 'FOR';
  if (statKey === 'agility') return 'AGI';
  if (statKey === 'intelligence') return 'INT';
  if (statKey === 'evadeChance') return 'ESQ';
  if (statKey === 'armorFlat') return 'CAR';
  return statKey;
};

window.hpFillClass = function hpFillClass(fighter) {
  const pct = hpPct(fighter);
  if (pct <= 30) return 'low';
  if (pct <= 60) return 'mid';
  return 'high';
};

window.statLineHtml = function statLineHtml(fighter, statKey, shortLabel) {
  const base = fighter.stats[statKey];
  const effective = getEffectiveStat(fighter, statKey);
  const delta = effective - base;
  const deltaText = delta === 0 ? '' : ` <span class="small ${delta > 0 ? 'up' : 'down'}">(${delta > 0 ? '+' : ''}${delta})</span>`;
  return `<span>${shortLabel} ${effective}${deltaText}</span>`;
};

window.specialStateLines = function specialStateLines(fighter) {
  const lines = [];
  if (fighter.flags.defended || StatusSystem.hasStatus(fighter, 'guard')) lines.push('Garde');
  if (fighter.flags.skipNextTurn) lines.push('Tour perdu');
  if (StatusSystem.hasStatus(fighter, 'drunk')) lines.push('Ivre');
  if (fighter.flags.extraTurn) lines.push('Tour bonus');
  if (fighter.potionCount <= 0) lines.push('Sans potion');
  if (fighter.boss) lines.push('Boss');
  return lines;
};

window.hudHtml = function hudHtml(fighter, active) {
  const badges = badgesFor(fighter)
    .map(badge => `<span class="badge ${badge.cls} ${appState.fx.pulsedStatus === fighter.id ? 'pulse' : ''}" title="${badge.detail}">${badge.text}</span>`)
    .join('');
  const statusLines = specialStateLines(fighter).map(line => `<div class="state-line">${line}</div>`).join('');

  return `
    <div class="hud ${active ? 'active' : ''}">
      <div class="hud-title">
        <div>
          <div class="hud-name">${fighter.name}</div>
          <div class="hud-role">${fighter.role}</div>
        </div>
        ${active ? '<span class="turn-badge">ACTIF</span>' : ''}
      </div>
      <div class="hpbar"><div class="hpfill ${hpFillClass(fighter)}" style="width:${hpPct(fighter)}%"></div></div>
      <div class="hud-meta">
        <span>PV ${fighter.currentHp} / ${fighter.stats.hpMax}</span>
        <span>Potion ${fighter.potionCount}</span>
      </div>
      <div class="hud-meta">
        ${statLineHtml(fighter, 'force', 'FOR')}
        ${statLineHtml(fighter, 'agility', 'AGI')}
        ${statLineHtml(fighter, 'intelligence', 'INT')}
      </div>
      <div class="badges">${badges}</div>
      ${statusLines ? `<div class="state-list">${statusLines}</div>` : ''}
    </div>`;
};

window.getSkillAvailability = function getSkillAvailability(actor, skillId) {
  const skill = SKILLS[skillId];
  if (!skill || !actor) return { ok: false, reason: 'Indisponible' };
  if (skill.condition?.hpPercentMax) {
    const hpPercent = (actor.currentHp / actor.stats.hpMax) * 100;
    if (hpPercent > skill.condition.hpPercentMax) {
      return { ok: false, reason: `PV <= ${skill.condition.hpPercentMax}%` };
    }
  }
  if (skill.kind === 'transform' && actor.flags?.usedTransformation) {
    return { ok: false, reason: 'Déjà utilisée' };
  }
  return { ok: true, reason: '' };
};

window.skillTargetLabel = function skillTargetLabel(skill) {
  if (skill.id === 'mimi') return 'mixte';
  return skill.target === 'self' ? 'soi' : 'ennemi';
};

window.skillEffectSummary = function skillEffectSummary(skillId) {
  const skill = SKILLS[skillId];
  if (!skill) return '';
  switch (skill.kind) {
    case 'physicalHeavy': return 'Gros dégâts.';
    case 'buff': return 'Boost + charge.';
    case 'transform': return 'Change sous seuil.';
    case 'debuff': return "Affaiblit l'ennemi.";
    case 'multi': return 'Impacts multiples.';
    case 'random': return 'Signature instable.';
    case 'poisonAttack': return 'Dégâts + poison.';
    case 'mimi': return 'Soin + ivresse ou gêne.';
    case 'dice': return 'Effet variable.';
    case 'magicDrain': return 'Drain renforcé.';
    case 'magicBlast': return 'Rafale magique.';
    case 'alchemy': return 'Choix : potion ou feu.';
    case 'steamEvade': return 'Prépare une esquive.';
    case 'debtStrike': return 'Punit la meilleure stat ennemie.';
  case 'fetidWave': return 'Magie INT + AGI + AGI-. ';
    case 'reflectNext': return '50% de renvoi sur la prochaine attaque.';
    case 'bloodMagic': return 'Sacrifie des PV pour frapper fort.';
    case 'halfHealOnce': return 'Soin de 50% une fois.';
    case 'sacrificeBurst': return 'Explose sous 30% PV.';
    case 'replacementCountdown': return 'Compte à rebours fatal.';
    case 'dualBuff': return 'FOR et AGI ++.';
    case 'healEnemyMark': return 'Soigne puis marque x2.';
    default: return skill.desc;
  }
};

window.skillCardHtml = function skillCardHtml(skillId, actor) {
  const skill = SKILLS[skillId];
  const availability = getSkillAvailability(actor, skillId);
  const icon = getSkillIcon(skillId, skill);
  return `
    <button class="skill-card ${skill.family} ${skill.signature ? 'signature-skill' : ''} ${availability.ok ? '' : 'is-locked'}" data-skill="${skillId}" ${availability.ok ? '' : 'disabled'}>
      <span class="skill-name"><span class="skill-icon">${icon}</span><span>${skill.name}</span></span>
      <span class="skill-meta">
        <span class="family-badge ${skill.family}">${skill.family}</span>
        <span class="family-badge target">${skillTargetLabel(skill)}</span>
        ${skill.signature ? '<span class="signature-badge">sig.</span>' : ''}
      </span>
      <span class="skill-effect">${availability.ok ? skillEffectSummary(skillId) : availability.reason}</span>
    </button>`;
};

window.sceneCaptionClass = function sceneCaptionClass() {
  const classes = [];
  if (appState.fx.familyPulse) classes.push(appState.fx.familyPulse);
  if (appState.fx.signaturePulse) classes.push('signature');
  return classes.join(' ');
};

window.battleTopStripHtml = function battleTopStripHtml() {
  const battle = appState.battle;
  const modeLabel = battle.mode === 'campaign' ? 'Campagne' : 'Arène';
  const stageLabel = battle.mode === 'campaign'
    ? `Étape ${battle.campaignStage}/${battle.campaignTotalStages}`
    : 'Duel unique';
  const centerLabel = battle.mode === 'campaign'
    ? `${stageLabel} · ${battle.campaignClanLabel || 'Route libre'}`
    : stageLabel;
  const enemyLabel = battle.isBossEncounter
    ? `Boss : ${battle.enemy.name}`
    : `Adversaire : ${battle.enemy.name}`;
  return `
    <div class="battle-top-strip" style="display:grid;position:absolute;left:248px;right:248px;top:18px;grid-template-columns:1fr 1.2fr 1fr;gap:8px;pointer-events:none;">
      <div style="background:rgba(12,13,18,0.86);border:2px solid rgba(255,255,255,0.12);padding:6px 8px;font-size:10px;text-transform:uppercase;letter-spacing:.04em;">${modeLabel}</div>
      <div style="background:rgba(12,13,18,0.86);border:2px solid rgba(255,255,255,0.12);padding:6px 8px;font-size:10px;text-transform:uppercase;letter-spacing:.04em;text-align:center;">${centerLabel}</div>
      <div style="background:rgba(12,13,18,0.86);border:2px solid ${battle.isBossEncounter ? 'rgba(255,209,102,0.35)' : 'rgba(255,255,255,0.12)'};padding:6px 8px;font-size:10px;text-transform:uppercase;letter-spacing:.04em;text-align:right;">${enemyLabel}</div>
    </div>`;
};

window.commandMenuHtml = function commandMenuHtml() {
  const battle = appState.battle;
  const playerTurn = battle.turnOwnerId === battle.player.id && !appState.busy && !battle.isEnded;
  const mode = battle.uiMode || 'main';
  const disabled = !playerTurn ? 'disabled' : '';
  const lockedClass = playerTurn ? '' : 'locked';

  if (!playerTurn) {
    return `<div class="cmd-box ${lockedClass}"><div class="cmd-title">Pause</div><div class="hint">Attends</div></div>`;
  }

  if (mode === 'skills') {
    const skills = battle.player.skills.map(skillId => skillCardHtml(skillId, battle.player)).join('');
    return `<div class="cmd-box"><div class="cmd-title">Comp.</div><div class="cmd-grid">${skills}</div><div class="footer-actions"><button data-back="main">Retour</button></div></div>`;
  }

  if (mode === 'mimi') {
    return `<div class="cmd-box"><div class="cmd-title">Mimi</div>
      <div class="cmd-grid">
        <button data-mode="self">Sur soi</button>
        <button data-mode="enemy" ${battle.player.flags.usedEnemyMimi ? 'disabled' : ''}>Sur ennemi</button>
      </div>
      <div class="footer-actions"><button data-back="skills">Retour</button></div>
    </div>`;
  }

  if (mode === 'alchimie') {
    const fireDisabled = battle.mode === 'arena' ? 'disabled' : '';
    return `<div class="cmd-box"><div class="cmd-title">Alchimie</div>
      <div class="cmd-grid">
        <button data-alchemy="break">Briser potion</button>
        <button data-alchemy="fire" ${fireDisabled}>Boule de feu</button>
      </div>
      ${battle.mode === 'arena' ? '<div class="hint">En arène, seule la destruction de potion est disponible.</div>' : '<div class="hint">En campagne et en End-less, Polo peut aussi lancer une boule de feu.</div>'}
      <div class="footer-actions"><button data-back="skills">Retour</button></div>
    </div>`;
  }

  const campaignHint = battle.mode === 'campaign'
    ? `<div class="hint">Les PV et potions restants seront conservés après cette rencontre.</div>`
    : '';

  return `
    <div class="cmd-box ${lockedClass}">
      <div class="cmd-title">Choix</div>
      <div class="cmd-grid">
        <button data-action="attack" ${disabled}>Frappe</button>
        <button data-action="skills" ${disabled}>Comp.</button>
        <button data-action="defend" ${disabled}>Garde</button>
        <button data-action="potion" ${battle.player.potionCount <= 0 ? 'disabled' : disabled}>Soin</button>
      </div>
      ${campaignHint}
    </div>`;
};

window.renderBattle = function renderBattle() {
  const battle = appState.battle;
  const playerActive = battle.turnOwnerId === battle.player.id;
  const latest = battle.log.slice(-8).map(line => `<div class="log-entry">${line}</div>`).join('');
  overlay.innerHTML = `
    <div class="battle-ui">
      <div class="hud-row">
        ${hudHtml(battle.player, playerActive)}
        ${hudHtml(battle.enemy, !playerActive)}
      </div>
      ${battleTopStripHtml()}
      <div class="log-box">${latest}</div>
      ${commandMenuHtml()}
    </div>`;

  if (appState.busy || battle.isEnded || battle.turnOwnerId !== battle.player.id) return;

  overlay.querySelector('[data-action="attack"]')?.addEventListener('click', () => performAction({ actorId: battle.player.id, targetId: battle.enemy.id, type: 'attack', label: `${battle.player.name} attaque.` }));
  overlay.querySelector('[data-action="defend"]')?.addEventListener('click', () => performAction({ actorId: battle.player.id, targetId: battle.player.id, type: 'defend', label: `${battle.player.name} se met en défense.` }));
  overlay.querySelector('[data-action="potion"]')?.addEventListener('click', () => performAction({ actorId: battle.player.id, targetId: battle.player.id, type: 'potion', label: `${battle.player.name} utilise une potion.` }));
  overlay.querySelector('[data-action="skills"]')?.addEventListener('click', () => {
    battle.uiMode = 'skills';
    render();
  });

  overlay.querySelectorAll('[data-skill]').forEach(btn => btn.addEventListener('click', () => {
    const skillId = btn.dataset.skill;
    if (skillId === 'mimi') {
      battle.uiMode = 'mimi';
      render();
      return;
    }
    if (skillId === 'alchimie') {
      battle.uiMode = 'alchimie';
      render();
      return;
    }
    const skill = SKILLS[skillId];
    const availability = getSkillAvailability(battle.player, skillId);
    if (!availability.ok) return;
    const targetId = skill.target === 'self' ? battle.player.id : battle.enemy.id;
    performAction({ actorId: battle.player.id, targetId, type: 'skill', skillId, label: `${battle.player.name} utilise ${skill.name}.` });
  }));

  overlay.querySelector('[data-back="main"]')?.addEventListener('click', () => {
    battle.uiMode = 'main';
    render();
  });

  overlay.querySelector('[data-back="skills"]')?.addEventListener('click', () => {
    battle.uiMode = 'skills';
    render();
  });

  overlay.querySelector('[data-mode="self"]')?.addEventListener('click', () => performAction({ actorId: battle.player.id, targetId: battle.player.id, type: 'skill', skillId: 'mimi', mode: 'self', label: `${battle.player.name} utilise Mimi.` }));
  overlay.querySelector('[data-mode="enemy"]')?.addEventListener('click', () => performAction({ actorId: battle.player.id, targetId: battle.enemy.id, type: 'skill', skillId: 'mimi', mode: 'enemy', label: `${battle.player.name} utilise Mimi.` }));
  overlay.querySelector('[data-alchemy="break"]')?.addEventListener('click', () => performAction({ actorId: battle.player.id, targetId: battle.enemy.id, type: 'skill', skillId: 'alchimie', mode: 'break', label: `${battle.player.name} utilise Alchimie.` }));
  overlay.querySelector('[data-alchemy="fire"]')?.addEventListener('click', () => performAction({ actorId: battle.player.id, targetId: battle.enemy.id, type: 'skill', skillId: 'alchimie', mode: 'fire', label: `${battle.player.name} utilise Alchimie.` }));
};


</script>
<script>

window.currentModeLabel = function currentModeLabel() {
  return appState.gameMode === 'campaign' ? 'campagne' : 'arène';
};

window.campaignClanOrderText = function campaignClanOrderText(campaign) {
  const order = campaign?.clanOrder || campaign?.completedClanIds || [];
  if (!order.length) return 'Aucun clan choisi pour l’instant.';
  return order.map(id => getCampaignClanDefinition(id).label).join(' → ');
};

window.renderTitle = function renderTitle() {
  overlay.innerHTML = `
    <div class="panel">
      <div class="title">End of Golems</div>
      <div class="stack">
        <button id="arenaBtn">Arène</button>
        <button id="campaignBtn">Campagne</button>
      </div>
    </div>`;

  document.getElementById('arenaBtn').onclick = () => {
    appState.gameMode = 'arena';
    appState.screen = 'select';
    if (!appState.selectedId) appState.selectedId = 'axel';
    render();
  };

  document.getElementById('campaignBtn').onclick = () => {
    appState.gameMode = 'campaign';
    appState.screen = 'select';
    if (!appState.selectedId) appState.selectedId = 'axel';
    render();
  };
};

window.selectionDetailHtml = function selectionDetailHtml(character) {
  if (!character) return '<div class="selection-detail empty">Choisis un combattant.</div>';
  const skills = character.skills.map(skillId => {
    const skill = SKILLS[skillId];
    const icon = getSkillIcon(skillId, skill);
    return `<div class="selection-skill ${skill.family}"><strong>${icon} ${skill.name}</strong><span>${skillEffectSummary(skillId)}</span></div>`;
  }).join('');
  const isCampaign = appState.gameMode === 'campaign';

  return `
    <div class="selection-detail">
      <div class="selection-head">
        <div>
          <div class="title small-title">${character.name}</div>
          <div class="subtitle compact">${character.role}</div>
        </div>
        <div class="identity-chip">${isCampaign ? 'Campagne' : 'Arène'}</div>
      </div>
      <div class="screen-note align-left">${character.gameplay}</div>
      <div class="selection-stats">FOR ${character.stats.force} · AGI ${character.stats.agility} · INT ${character.stats.intelligence} · PV ${character.stats.hpMax}</div>
      ${isCampaign ? '<div class="screen-note align-left strong-note">2 potions · +3 PV max / victoire</div>' : ''}
      <div class="selection-skills">${skills}</div>
      <div class="footer-actions">
        <button id="confirmSelectBtn">${isCampaign ? 'Ouvrir la carte' : 'Entrer dans l’arène'}</button>
        <button id="backTitleBtn">Retour titre</button>
      </div>
    </div>`;
};

window.renderSelect = function renderSelect() {
  const characters = Object.values(CHARACTERS).filter(character => !character.temporary);
  const selectedId = appState.selectedId || characters[0].id;
  appState.selectedId = selectedId;
  const selected = CHARACTERS[selectedId];

  const cards = characters.map(character => `
      <button class="char-card ${character.id === selectedId ? 'is-selected' : ''}" data-id="${character.id}" data-char="${character.id}">
        <strong>${character.name}</strong><br>
        <span class="small">${character.role}</span>
      </button>`).join('');

  overlay.innerHTML = `
    <div class="panel panel-select">
      <div class="title">Choisis ton combattant</div>
      <div class="subtitle">Mode ${currentModeLabel()}</div>
      <div class="selection-layout">
        <div class="char-grid">${cards}</div>
        ${selectionDetailHtml(selected)}
      </div>
    </div>`;

  overlay.querySelectorAll('[data-id]').forEach(btn => {
    btn.onclick = () => {
      appState.selectedId = btn.dataset.id;
      render();
    };
  });

  document.getElementById('confirmSelectBtn').onclick = () => {
    if (appState.gameMode === 'campaign') startCampaign(appState.selectedId);

window.getCampaignMapNodeState = function getCampaignMapNodeState(campaign, clanId) {
  if (campaign.completedClanIds.includes(clanId)) return 'completed';
  if (campaign.currentClanId === clanId) return 'current';
  if (campaign.remainingClanIds.includes(clanId) && !campaign.currentClanId) return 'available';
  return 'locked';
};

window.campaignMapCardHtml = function campaignMapCardHtml(campaign, clanId) {
  const clan = getCampaignClanDefinition(clanId);
  const state = getCampaignMapNodeState(campaign, clanId);
  const isCompleted = state === 'completed';
  const isAvailable = state === 'available';
  const status = isCompleted ? 'Conquis' : state === 'current' ? 'En cours' : isAvailable ? 'Disponible' : 'En attente';
  const encounters = campaign.clans[clanId] || [];
  const steps = encounters.map((entry, index) => {
    const cls = [
      'encounter-rune',
      entry.isBoss ? 'boss' : 'mob',

window.campaignNodeOrderIndex = function campaignNodeOrderIndex(campaign, clanId) {

window.campaignPathBadgesHtml = function campaignPathBadgesHtml(campaign) {

window.campaignRouteProgressSvg = function campaignRouteProgressSvg(campaign) {
  const order = campaign?.clanOrder || [];
  const points = {
    frontiere: { x: 220, y: 180 },
    pacte_social: { x: 780, y: 180 },
    laitues: { x: 220, y: 420 },
    golems: { x: 780, y: 420 }
  };
  const base = `
    <path d="M220 180 Q 500 90 780 180" class="atlas-link"></path>
    <path d="M220 180 Q 120 300 220 420" class="atlas-link"></path>
    <path d="M780 180 Q 880 300 780 420" class="atlas-link"></path>
    <path d="M220 420 Q 500 520 780 420" class="atlas-link"></path>
    <path d="M220 180 Q 500 300 780 420" class="atlas-link faint"></path>
    <path d="M780 180 Q 500 300 220 420" class="atlas-link faint"></path>`;
  const progress = order.slice(0, -1).map((clanId, index) => {
    const from = points[clanId];
    const to = points[order[index + 1]];
    if (!from || !to) return '';
    const mx = (from.x + to.x) / 2;
    const my = (from.y + to.y) / 2 + (from.y === to.y ? -70 : from.x === to.x ? 0 : 16);
    return `<path d="M ${from.x} ${from.y} Q ${mx} ${my} ${to.x} ${to.y}" class="atlas-link-progress step-${index + 1}"></path>`;
  }).join('');
  const markers = order.map((clanId, index) => {
    const point = points[clanId];
    const clan = getCampaignClanDefinition(clanId);
    if (!point || !clan) return '';
    return `
      <g class="atlas-route-marker marker-${index + 1}" style="--clan-accent:${clan.accent};">
        <circle cx="${point.x}" cy="${point.y - 78}" r="22"></circle>
        <text x="${point.x}" y="${point.y - 72}">${index + 1}</text>
      </g>`;
  }).join('');
  return `<svg class="atlas-links" viewBox="0 0 1000 620" preserveAspectRatio="none" aria-hidden="true">${base}${progress}${markers}</svg>`;
};

      <div class="screen-note align-left strong-note">Victoire finale</div>

      <div class="selection-stats">Ordre traversé : ${campaignClanOrderText(campaign)}</div>
      <div class="selection-stats">Bonus finaux : PV max +${campaign.playerState.maxHpBonus || 0} · FOR +${campaign.playerState.statBonuses.force} · AGI +${campaign.playerState.statBonuses.agility} · INT +${campaign.playerState.statBonuses.intelligence}</div>

          <div class="screen-note align-left strong-note">Sortie</div>
          <div class="footer-actions">${rightButtons}</div>
        </div>
      </div>

  document.getElementById('continueCampaignBtn')?.addEventListener('click', () => advanceCampaign());
  document.getElementById('restartCampaignBtn')?.addEventListener('click', () => startCampaign(appState.selectedId));
  document.getElementById('selectBtn')?.addEventListener('click', () => {

<script>
window.spriteOffset = function spriteOffset(id) {
  if (appState.fx.shake === id) return { x: Math.random() * 6 - 3, y: Math.random() * 6 - 3 };

const SPRITE_RES = 512;
const spritePaintCache = new Map();

function clamp01(v) {
  return Math.max(0, Math.min(1, v));
}

function hexToRgb(hex) {
  const clean = String(hex || '#000000').replace('#', '').trim();
  const full = clean.length === 3 ? clean.split('').map(ch => ch + ch).join('') : clean.padEnd(6, '0').slice(0, 6);
  return {
    r: parseInt(full.slice(0, 2), 16),
    g: parseInt(full.slice(2, 4), 16),
    b: parseInt(full.slice(4, 6), 16)
  };
}

function rgbToHex(rgb) {
  const toHex = (v) => Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2, '0');
  return `#${toHex(rgb.r)}${toHex(rgb.g)}${toHex(rgb.b)}`;
}

function mixColor(a, b, t) {
  const ca = hexToRgb(a);
  const cb = hexToRgb(b);
  const k = clamp01(t);
  return rgbToHex({
    r: ca.r + (cb.r - ca.r) * k,
    g: ca.g + (cb.g - ca.g) * k,
    b: ca.b + (cb.b - ca.b) * k
  });
}

function tint(hex, amount) {
  return amount >= 0 ? mixColor(hex, '#ffffff', amount) : mixColor(hex, '#000000', -amount);
}

function alpha(hex, a) {
  const c = hexToRgb(hex);
  return `rgba(${c.r}, ${c.g}, ${c.b}, ${clamp01(a)})`;
}

function fillCircle(c, x, y, r, fill) {
  c.beginPath();
  c.arc(x, y, r, 0, Math.PI * 2);
  c.fillStyle = fill;
  c.fill();
}

function fillEllipse(c, x, y, rx, ry, fill) {
  c.beginPath();
  c.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
  c.fillStyle = fill;

function poly(c, points, fill, stroke, lineWidth) {
  if (!points || !points.length) return;
  c.beginPath();
  c.moveTo(points[0][0], points[0][1]);
  for (let i = 1; i < points.length; i += 1) c.lineTo(points[i][0], points[i][1]);

  if (fill) {
    c.fillStyle = fill;
    c.fill();
  }
  if (stroke) {
    c.strokeStyle = stroke;
    c.lineWidth = lineWidth || 1;
    c.stroke();
  }
}

function roundRectPath(c, x, y, w, h, r) {
  const rr = Math.min(r, w / 2, h / 2);
  c.beginPath();
  c.moveTo(x + rr, y);
  c.lineTo(x + w - rr, y);
  c.quadraticCurveTo(x + w, y, x + w, y + rr);
  c.lineTo(x + w, y + h - rr);
  c.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
  c.lineTo(x + rr, y + h);
  c.quadraticCurveTo(x, y + h, x, y + h - rr);
  c.lineTo(x, y + rr);
  c.quadraticCurveTo(x, y, x + rr, y);
  c.closePath();
}

function fillRoundRect(c, x, y, w, h, r, fill, stroke, lineWidth) {
  roundRectPath(c, x, y, w, h, r);
  if (fill) {
    c.fillStyle = fill;
    c.fill();
  }
  if (stroke) {
    c.strokeStyle = stroke;
    c.lineWidth = lineWidth || 1;

  }
}

function finiteNumber(v) {
  return typeof v === 'number' && Number.isFinite(v);
}

function linearGradient(c, x0, y0, x1, y1, stops) {
  if (!c || typeof c.createLinearGradient !== 'function') return stops[stops.length - 1][1];
  if (![x0, y0, x1, y1].every(finiteNumber)) return stops[stops.length - 1][1];
  const g = c.createLinearGradient(x0, y0, x1, y1);
  if (!g || typeof g.addColorStop !== 'function') return stops[stops.length - 1][1];
  stops.forEach(stop => g.addColorStop(stop[0], stop[1]));
  return g;
}

function radialGradient(c, x0, y0, r0, x1, y1, r1, stops) {
  if (!c || typeof c.createRadialGradient !== 'function') return stops[0][1];
  if (![x0, y0, r0, x1, y1, r1].every(finiteNumber)) return stops[0][1];
  const g = c.createRadialGradient(x0, y0, r0, x1, y1, r1);
  if (!g || typeof g.addColorStop !== 'function') return stops[0][1];

function withShadow(c, color, blur, ox, oy, fn) {

  c.shadowBlur = blur;

function brushDabs(c, x, y, w, h, colorA, colorB, count, seed) {
  const total = count || 8;

    const u = ((i + 1) * 0.41421356237 + (seed || 0) * 0.271) % 1;
    const px = x + (t - 0.5) * w;
    const py = y + (u - 0.5) * h;

    const rh = 1.5 + ((i * 5 + (seed || 0) * 13) % 5);
    fillEllipse(c, px, py, rw, rh, i % 2 ? colorA : colorB);

function seamStitches(c, x, y, w, count, color) {

function buildPalette(fighter) {

    metalDark: mixColor(dark, '#394556', 0.30),

function fillRectSafe(c, x, y, w, h, fill) {

function paintBlade(c, x, y, len, width, pal, angle, sabre) {
  c.save();
  c.translate(x, y);
  c.rotate(angle);
  const blade = linearGradient(c, 0, -len, 0, 0, [[0, tint(pal.metal, 0.18)], [0.45, pal.metal], [1, pal.metalDark]]);
  poly(c, sabre
    ? [[-width * 0.5, 0], [width * 0.35, -len * 0.22], [width * 0.5, -len], [-width * 0.2, -len * 0.92], [-width, -len * 0.12]]
    : [[-width, 0], [width, 0], [width * 0.5, -len], [-width * 0.35, -len]], blade, pal.outline, 2);
  fillRoundRect(c, -width * 1.4, -4, width * 2.8, 8, 4, pal.accent);
  fillRoundRect(c, -4, 2, 8, 16, 3, pal.leather);
  c.restore();
}

function paintStaff(c, x, y, len, pal, angle, rune) {
  c.save();
  c.translate(x, y);
  c.rotate(angle);
  fillRoundRect(c, -4, -len, 8, len + 20, 4, linearGradient(c, 0, -len, 0, 20, [[0, tint(pal.leather, 0.18)], [1, tint(pal.dark, 0.08)]]));
  fillCircle(c, 0, -len, 14, radialGradient(c, 0, -len, 2, 0, -len, 14, [[0, pal.highlight], [1, pal.accent]]));
  drawSpark(c, 0, -len, 8, alpha(rune || pal.rune, 0.72), 0.4);
  c.restore();
}

function paintGem(c, x, y, size, pal, core) {
  poly(c, [[x, y - size], [x + size, y], [x, y + size], [x - size, y]], linearGradient(c, x, y - size, x, y + size, [[0, core || pal.highlight], [1, pal.accent]]), pal.outline, 1.5);
  fillCircle(c, x - size * 0.18, y - size * 0.25, Math.max(1.5, size * 0.18), alpha('#ffffff', 0.65));
}

function paintSigil(c, x, y, r, pal, spokes) {
  c.save();
  c.strokeStyle = alpha(pal.glow, 0.40);
  c.lineWidth = 1.6;
  c.beginPath();
  c.arc(x, y, r, 0, Math.PI * 2);
  c.stroke();
  c.beginPath();
  c.arc(x, y, r * 0.58, 0, Math.PI * 2);
  c.stroke();
  for (let i = 0; i < (spokes || 6); i += 1) {
    const a = (Math.PI * 2 * i) / (spokes || 6);
    c.beginPath();
    c.moveTo(x + Math.cos(a) * r * 0.58, y + Math.sin(a) * r * 0.58);
    c.lineTo(x + Math.cos(a) * r, y + Math.sin(a) * r);
    c.stroke();
  }
  c.restore();
}
