function paintSpriteToCanvas(c, fighter) {
  c.clearRect(0, 0, SPRITE_RES, SPRITE_RES);
  const type = fighter.renderType || fighter.baseId || fighter.id;
  const scale = SPRITE_RES / 256;
  c.save();
  c.scale(scale, scale);
  if (type === 'axel') paintHumanoidSprite(c, fighter, { weapon: 'axe', weaponLen: 96, weaponAngle: 0.98, hair: 'crest', bracers: true, eyeColor: '#ffca7d', backCloak: false, postType: 'axel' });
  else if (type === 'francois') paintHumanoidSprite(c, fighter, { weapon: 'sword', weaponLen: 102, weaponAngle: 0.60, armor: true, hat: 'helm', backCloak: true, trim: true, bracers: true, eyeColor: '#8fd6ff', postType: 'francois' });
  else if (type === 'jojo') paintHumanoidSprite(c, fighter, { weapon: 'dagger', hair: 'curl', narrowTorso: true, coatSkirt: true, eyeColor: '#9dff8f', backCloak: true, postType: 'jojo' });
  else if (type === 'polo') paintHumanoidSprite(c, fighter, { weapon: 'staff', weaponLen: 108, weaponAngle: 0.22, hair: 'slick', narrowTorso: true, coatSkirt: true, eyeColor: '#c9b7ff', backCloak: true, postType: 'polo' });
  else if (type === 'market') paintHumanoidSprite(c, fighter, { weapon: 'sword', sabre: true, weaponLen: 100, weaponAngle: 0.78, hat: 'tricorne', trim: true, backCloak: true, bracers: true, eyeColor: '#f2dfb5', postType: 'market' });
  else if (type === 'bok') paintHumanoidSprite(c, fighter, { weapon: 'staff', weaponLen: 82, weaponAngle: 0.54, hat: 'hood', backCloak: true, capeFront: true, narrowTorso: true, eyeColor: '#d4d8ff', postType: 'bok' });
  else if (type === 'nate') paintHumanoidSprite(c, fighter, { weapon: 'axe', weaponLen: 104, weaponAngle: 1.02, hair: 'crest', bracers: true, backCloak: true, eyeColor: '#ffd77f', postType: 'nate' });
  else if (type === 'slime') { paintSlimeSprite(c, fighter); paintJrpgPostProcess(c, fighter, 'slime'); }
  else if (type === 'beast') { paintBeastSprite(c, fighter); paintJrpgPostProcess(c, fighter, 'beast'); }
  else if (type === 'construct') { paintConstructSprite(c, fighter, false); paintJrpgPostProcess(c, fighter, 'construct'); }
  else if (type === 'constructBoss') { paintConstructSprite(c, fighter, true); paintJrpgPostProcess(c, fighter, 'constructBoss'); }
  else if (type === 'specter') { paintSpecterSprite(c, fighter, false, false); paintJrpgPostProcess(c, fighter, 'specter'); }
  else if (type === 'specterBoss') { paintSpecterSprite(c, fighter, true, false); paintJrpgPostProcess(c, fighter, 'specterBoss'); }
  else if (type === 'hydra') { paintHydraSprite(c, fighter); paintJrpgPostProcess(c, fighter, 'hydra'); }
  else if (type === 'nicolasSpecter') { paintSpecterSprite(c, fighter, false, true); paintJrpgPostProcess(c, fighter, 'nicolasSpecter'); }
  else if (type === 'fatima') { paintFatimaSprite(c, fighter); paintJrpgPostProcess(c, fighter, 'fatima'); }
  else if (type === 'skeletonCouple') { paintSkeletonCoupleSprite(c, fighter); paintJrpgPostProcess(c, fighter, 'skeletonCouple'); }
  else if (type === 'bikerZombie') { paintBikerZombieSprite(c, fighter); paintJrpgPostProcess(c, fighter, 'bikerZombie'); }
  else if (type === 'undeadBear') { paintUndeadBearSprite(c, fighter); paintJrpgPostProcess(c, fighter, 'undeadBear'); }
  else if (type === 'lettuce') { paintLettuceSprite(c, fighter, false, false); paintJrpgPostProcess(c, fighter, 'lettuce'); }
  else if (type === 'lettuceAlt') { paintLettuceSprite(c, fighter, false, true); paintJrpgPostProcess(c, fighter, 'lettuceAlt'); }
  else if (type === 'lettuceBoss') { paintLettuceSprite(c, fighter, true, true); paintJrpgPostProcess(c, fighter, 'lettuceBoss'); }
  else if (type === 'golemMage') { paintGolemMageSprite(c, fighter, false, false); paintJrpgPostProcess(c, fighter, 'golemMage'); }
  else if (type === 'golemMageAlt') { paintGolemMageSprite(c, fighter, false, true); paintJrpgPostProcess(c, fighter, 'golemMageAlt'); }
  else if (type === 'golemBossMagic') { paintGolemMageSprite(c, fighter, true, true); paintJrpgPostProcess(c, fighter, 'golemBossMagic'); }
  else { paintSlimeSprite(c, fighter); paintJrpgPostProcess(c, fighter, 'slime'); }
  c.restore();
}

function createSpriteCanvas() {
  if (typeof OffscreenCanvas !== 'undefined') return new OffscreenCanvas(SPRITE_RES, SPRITE_RES);
  if (typeof document !== 'undefined' && document.createElement) {
    const c = document.createElement('canvas');
    if (c && c.getContext) {
      c.width = SPRITE_RES;
      c.height = SPRITE_RES;
      return c;
    }
  }
  return null;
}

function getSpriteCanvas(fighter) {
  const key = JSON.stringify({
    id: fighter.id,
    baseId: fighter.baseId,
    renderType: fighter.renderType,
    colors: fighter.colors,
    boss: !!fighter.boss
  });
  if (spritePaintCache.has(key)) return spritePaintCache.get(key);
  const surface = createSpriteCanvas();
  if (!surface || !surface.getContext) return null;
  const c = surface.getContext('2d');
  if (!c) return null;
  paintSpriteToCanvas(c, fighter);
  spritePaintCache.set(key, surface);
  return surface;
}

window.drawBackground = function drawBackground() {
  const arena = appState.battle?.arena || 'citadel';
  const theme = arena === 'forge'
    ? {
        skyTop: '#130f15', skyMid: '#27181c', skyLow: '#4a2921', haze: '#ff9a5e', glow: '#ffb074', stoneA: '#31272c', stoneB: '#211a21', midA: '#57463f', midB: '#31272d', floorA: '#5f4a41', floorB: '#372a27', crack: '#ff9e5e', deco: '#785649', accent: '#ffcf98'
      }
    : arena === 'swamp'
      ? {
          skyTop: '#0d1716', skyMid: '#163128', skyLow: '#27453a', haze: '#8bd38a', glow: '#baf0a8', stoneA: '#25322b', stoneB: '#17241f', midA: '#385247', midB: '#22362f', floorA: '#4b5f55', floorB: '#2b3d36', crack: '#7fdc9f', deco: '#567164', accent: '#dff7c7'
        }
      : {
          skyTop: '#0f131b', skyMid: '#1c2431', skyLow: '#303b4d', haze: '#7ea2d8', glow: '#c0d6ff', stoneA: '#2b323f', stoneB: '#1d2430', midA: '#475367', midB: '#2b3545', floorA: '#586273', floorB: '#323a49', crack: '#8fb3e8', deco: '#6e7c93', accent: '#edf4ff'
        };

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = linearGradient(ctx, 0, 0, 0, canvas.height, [[0, theme.skyTop], [0.44, theme.skyMid], [0.82, theme.skyLow], [1, tint(theme.skyLow, -0.08)]]);
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = radialGradient(ctx, 720, 116, 10, 720, 116, 420, [[0, alpha(theme.glow, arena === 'forge' ? 0.22 : 0.18)], [0.42, alpha(theme.haze, 0.12)], [1, alpha(theme.skyTop, 0)]]);
  fillEllipse(ctx, 720, 116, 430, 178, ctx.fillStyle);
  ctx.fillStyle = radialGradient(ctx, 380, 150, 10, 380, 150, 300, [[0, alpha(theme.accent, 0.10)], [0.55, alpha(theme.haze, 0.05)], [1, alpha(theme.skyTop, 0)]]);
  fillEllipse(ctx, 380, 150, 300, 120, ctx.fillStyle);

  for (let i = 0; i < 7; i += 1) {
    const x = 70 + i * 210;
    const h = 170 + (i % 3) * 26;
    const w = 140 + (i % 2) * 22;
    ctx.fillStyle = linearGradient(ctx, x, 120, x, 330, [[0, alpha(theme.midA, 0.70)], [1, alpha(theme.midB, 0.22)]]);
    fillEllipse(ctx, x, 300 - i * 2, w, h, ctx.fillStyle);
  }

  const frameTint = arena === 'forge' ? '#1b1518' : arena === 'swamp' ? '#112019' : '#1b212b';
  ctx.fillStyle = linearGradient(ctx, 0, 120, 0, 560, [[0, alpha(frameTint, 0.06)], [1, alpha(frameTint, 0.62)]]);
  fillEllipse(ctx, 68, 282, 156, 264, ctx.fillStyle);
  fillEllipse(ctx, 1372, 278, 168, 270, ctx.fillStyle);

  if (arena === 'forge') {
    withShadow(ctx, alpha(theme.haze, 0.34), 34, 0, 0, () => {
      ctx.fillStyle = alpha(theme.haze, 0.16);
      fillEllipse(ctx, 1100, 180, 180, 60, ctx.fillStyle);
      fillEllipse(ctx, 240, 204, 132, 38, alpha(theme.haze, 0.11));
    });
    for (let i = 0; i < 5; i += 1) {
      const x = 122 + i * 270;
      fillRoundRect(ctx, x, 138, 32, 150, 12, alpha('#251a1a', 0.84));
      fillRoundRect(ctx, x - 16, 128, 62, 18, 8, alpha('#725346', 0.62));
      fillRectSafe(ctx, x + 6, 156, 8, 112, alpha('#ffffff', 0.05));
      fillRectSafe(ctx, x + 18, 156, 3, 112, alpha('#000000', 0.14));
    }
    for (let i = 0; i < 4; i += 1) {
      const x = 190 + i * 300;
      paintRibbon(ctx, [[x, 220], [x + 44, 204], [x + 72, 228], [x + 34, 252]], alpha(theme.glow, 0.08), alpha('#ffffff', 0.02));
    }
  } else if (arena === 'swamp') {
    for (let i = 0; i < 7; i += 1) {
      const x = 86 + i * 198;
      ctx.fillStyle = alpha('#1a2d23', 0.78);
      fillEllipse(ctx, x, 258 + (i % 2) * 12, 58 + (i % 3) * 12, 20, ctx.fillStyle);
      ctx.strokeStyle = alpha('#8dde8d', 0.18);
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x, 250); ctx.lineTo(x - 8, 216); ctx.lineTo(x + 12, 180); ctx.lineTo(x + 4, 150);
      ctx.stroke();
      fillEllipse(ctx, x + 18, 286, 34, 10, alpha('#c9ffc7', 0.05));
    }
    fillEllipse(ctx, 720, 300, 520, 48, alpha('#d8ffd0', 0.04));
  } else {
    withShadow(ctx, alpha(theme.glow, 0.16), 28, 0, 0, () => {
      ctx.fillStyle = alpha(theme.glow, 0.10);
      fillEllipse(ctx, 720, 118, 320, 58, ctx.fillStyle);
    });
    for (let i = 0; i < 5; i += 1) {
      const x = 96 + i * 278;
      fillRoundRect(ctx, x, 132, 40, 160, 14, alpha('#1e2532', 0.74));
      fillRoundRect(ctx, x - 12, 124, 64, 20, 8, alpha('#67738b', 0.34));
      fillRectSafe(ctx, x + 9, 148, 6, 120, alpha('#ffffff', 0.05));

    paintSigil(ctx, 720, 174, 72, { glow: alpha(theme.accent, 0.18) }, 8);
    paintSigil(ctx, 720, 174, 42, { glow: alpha(theme.accent, 0.14) }, 6);
  }

  ctx.fillStyle = linearGradient(ctx, 0, 326, 0, canvas.height, [[0, tint(theme.floorA, 0.10)], [1, theme.floorB]]);
  ctx.fillRect(0, 326, canvas.width, canvas.height - 326);

  for (let row = 0; row < 4; row += 1) {
    for (let col = 0; col < 14; col += 1) {
      const x = col * 96 + (row % 2) * 16;
      const y = 340 + row * 82;
      const w = 92;
      const h = 66;
      const fill = (row + col) % 2 === 0 ? alpha(theme.floorA, 0.78) : alpha(theme.floorB, 0.88);
      fillRoundRect(ctx, x, y, w, h, 12, fill);
      ctx.fillStyle = alpha('#ffffff', 0.04);
      ctx.fillRect(x + 10, y + 8, 28, 3);
      ctx.fillStyle = alpha('#000000', 0.10);
      ctx.fillRect(x + 10, y + h - 10, 38, 3);
      ctx.fillStyle = alpha(theme.deco, 0.10);
      ctx.fillRect(x + w - 24, y + 14, 10, h - 24);
    }
  }

  ctx.strokeStyle = alpha(theme.crack, arena === 'forge' ? 0.22 : arena === 'swamp' ? 0.12 : 0.15);
  ctx.lineWidth = 2;
  for (let i = 0; i < 10; i += 1) {
    const x = 40 + i * 126;
    ctx.beginPath();
    ctx.moveTo(x, 410 + (i % 2) * 14);
    ctx.lineTo(x + 22, 426 + (i % 3) * 10);
    ctx.lineTo(x + 6, 450 + (i % 2) * 12);
    ctx.lineTo(x + 28, 468 + (i % 3) * 6);
    ctx.stroke();
  }

  fillEllipse(ctx, 300, 362, 152, 24, alpha('#0d1016', 0.22));
  fillEllipse(ctx, 720, 336, 156, 24, alpha('#0d1016', 0.22));
}

function drawFallbackSprite(fighter, side) {
  const pos = fighterPosition(side);
  const x = pos.x;
  const y = pos.y;
  ctx.fillStyle = fighter.colors?.main || '#777';
  ctx.fillRect(x - 28, y - 86, 56, 92);
  ctx.fillStyle = fighter.colors?.accent || '#ddd';
  ctx.fillRect(x - 14, y - 116, 28, 28);
  ctx.fillStyle = fighter.colors?.dark || '#222';
  ctx.fillRect(x - 36, y - 58, 12, 28);
  ctx.fillRect(x + 24, y - 58, 12, 28);
  ctx.fillRect(x - 18, y + 6, 12, 42);
  ctx.fillRect(x + 6, y + 6, 12, 42);
}

window.drawSprite = function drawSprite(fighter, side) {
  const pos = fighterPosition(side);
  const off = spriteOffset(fighter.id);
  const x = pos.x + off.x;
  const y = pos.y + off.y;
  const flash = appState.fx.flash === fighter.id;
  const sprite = getSpriteCanvas(fighter);
  const isBoss = !!fighter.boss || /Boss|hydra|ours|grande_tapee|golem_central/.test(String(fighter.id || fighter.renderType || ''));
  const mobileFactor = window.MOBILE_VIEW ? 0.68 : 1;
  const h = Math.round((isBoss ? 394 : fighter.renderType === 'slime' ? 314 : fighter.renderType === 'beast' || fighter.renderType === 'undeadBear' ? 356 : 374) * mobileFactor);
  const w = Math.round(h * (fighter.renderType === 'slime' ? 1.04 : 1.00));
  const drawX = x - Math.round(w / 2);
  const drawY = y - h + (window.MOBILE_VIEW ? 72 : 92);

  ctx.save();
  if (side === 'enemy') {
    ctx.translate(x, 0);
    ctx.scale(-1, 1);
    ctx.translate(-x, 0);
  }

  if (flash) {
    ctx.shadowBlur = 22;
    ctx.shadowColor = fighter.colors?.accent || '#ffffff';
  }

  if (sprite && ctx.drawImage) {
    ctx.drawImage(sprite, drawX, drawY, w, h);
  } else {
    drawFallbackSprite(fighter, side);
  }
  ctx.restore();

  const shadowW = Math.round((isBoss ? 166 : 138) * (window.MOBILE_VIEW ? 0.78 : 1));
  const shadowH = Math.round((fighter.renderType === 'slime' ? 26 : 22) * (window.MOBILE_VIEW ? 0.78 : 1));
  ctx.fillStyle = radialGradient(ctx, pos.x, pos.y + 42, 8, pos.x, pos.y + 42, shadowW / 2, [[0, 'rgba(0,0,0,0.42)'], [1, 'rgba(0,0,0,0)']]);
  fillEllipse(ctx, pos.x, pos.y + 42, shadowW / 2, shadowH, ctx.fillStyle);
};

window.renderScene = function renderScene() {
  drawBackground();
  if (appState.screen === 'battle' || appState.screen === 'end') {
    drawSprite(appState.battle.player, 'player');
    drawSprite(appState.battle.enemy, 'enemy');
  }
};

window.render = function render() {
  renderScene();
  if (appState.screen === 'title') return renderTitle();
  if (appState.screen === 'select') return renderSelect();
  if (appState.screen === 'campaignMap') return renderCampaignMap();
  if (appState.screen === 'battle') return renderBattle();
  if (appState.screen === 'end') return renderEnd();
};

<script>

window.DamageSystem = {
  armor(fighter) {
    const flatArmor = sumTimedEffects(fighter, 'armorFlat', 'buffs') + sumTimedEffects(fighter, 'armorFlat', 'debuffs');
    return Math.max(0, Math.floor(this.effectiveStat(fighter, 'agility') / 2) + flatArmor);
  },

  evadeChance(fighter) {
    const flatEvade = sumTimedEffects(fighter, 'evadeChance', 'buffs') + sumTimedEffects(fighter, 'evadeChance', 'debuffs');
    return Math.min(100, Math.max(0, Math.floor(this.effectiveStat(fighter, 'agility') * BALANCE.evadePerAgility) + flatEvade));
  },

  effectiveStat(fighter, stat) {
    return getEffectiveStat(fighter, stat);
  },

  capDamage(value, skill) {
    const battle = window.appState?.battle;
    const currentActorId = this.currentActorId || null;
    if (battle?.mode === 'endless' && currentActorId && battle.player?.id === currentActorId) {
      return value;
    }
    const max = skill && skill.exceptionalDamageAllowed ? BALANCE.exceptionalDamageCap : BALANCE.normalDamageCap;
    return Math.min(max, value);
  },

  calcPhysical(attacker, defender, formula, skill = null) {
    const raw = Math.floor(this.effectiveStat(attacker, 'force') * formula.scale + formula.base);
    const reduced = Math.max(1, raw - this.armor(defender));
    return this.capDamage(reduced, skill);
  },

  calcBasicAttack(attacker, defender) {
    const raw = Math.floor(this.effectiveStat(attacker, 'force') * BALANCE.attackScale + BALANCE.attackBase);
    const reduced = Math.max(1, raw - this.armor(defender));
    return this.capDamage(reduced, null);
  },

  calcMagic(attacker, defender, scale, base, skill = null) {
    const raw = Math.floor(this.effectiveStat(attacker, 'intelligence') * scale + base);
    const reduced = Math.max(1, raw - Math.floor(this.armor(defender) * 0.25));
    return this.capDamage(reduced, skill);
  },

  applyDefense(target, value, events = null) {
    if (!(target.flags.defended || StatusSystem.hasStatus(target, 'guard'))) return value;
    target.flags.defended = false;
    if (StatusSystem.hasStatus(target, 'guard')) {
      StatusSystem.removeStatus(target, 'guard');
      if (events) {
        queueStatusEvent(events, target, 'guard', 'Garde brisée', `${target.name} amortit l\'impact.`, 'defense', 'Garde');
      }
    }
    return Math.max(1, Math.floor(value * (1 - BALANCE.defenseReduction)));
  },

  maybeCrit() {
    return Math.random() < BALANCE.critChance;
  },

  tryHit(target) {
    return Math.random() >= this.evadeChance(target) / 100;
  }
};

function queueStatusEvent(events, target, statusId, label, message, family, caption = null) {
  events.push({
    type: 'STATUS',
    targetId: target.id,
    targetSide: findWhichFighter(target.id),
    statusId,
    family,
    label,
    caption,
    message
  });
}

function applyTimedModifier(target, effect, kind, events) {
  const applied = StatusSystem.addTimedModifier(target, { ...effect, skipTickOnce: true }, kind);
  queueStatusEvent(events, target, applied.statusId, applied.label, `${target.name} gagne ${applied.label}.`, applied.family, 'Effet appliqué');
  return applied;
}

function applyFragileIfNeeded(target, damage, events) {
  if (!StatusSystem.hasStatus(target, 'fragile')) return damage;
  StatusSystem.removeStatus(target, 'fragile');
  queueStatusEvent(events, target, 'fragile', 'Fragilité brisée', `${target.name} encaisse un impact amplifié.`, 'technique', 'Faille exploitée');
  return Math.floor(damage * BALANCE.fragileMultiplier);
}

function consumeTastyMarkIfPresent(target, actor, damage, events) {
  const tasty = StatusSystem.getStatus(target, 'tasty_mark');
  if (!tasty) return damage;
  if (tasty.meta?.sourceId && tasty.meta.sourceId !== actor.id) return damage;
  StatusSystem.removeStatus(target, 'tasty_mark');
  queueStatusEvent(events, target, 'tasty_mark', 'Tasty brisé', `${target.name} encaisse la livraison doublée.`, 'technique', 'Tasty crousty');
  return DamageSystem.capDamage(Math.max(1, Math.floor(damage * (tasty.meta?.multiplier || 2))), null);
}

function consumeChargeIfPresent(actor, events) {
  if (!StatusSystem.hasStatus(actor, 'charge')) return 1;
  StatusSystem.removeStatus(actor, 'charge');
  queueStatusEvent(events, actor, 'charge', 'Charge consommée', `${actor.name} libère sa charge.`, 'technique', 'Charge libérée');
  return BALANCE.chargeMultiplier;
}

function tryEvadeOrReactive(target, events) {
  if (StatusSystem.hasStatus(target, 'evade_next')) {
    StatusSystem.removeStatus(target, 'evade_next');
    events.push({ type: 'EVADED', targetId: target.id, targetSide: findWhichFighter(target.id) });
    queueStatusEvent(events, target, 'evade_next', 'Vapeur dissipée', `${target.name} esquive grâce à la vapeur.`, 'magic', 'Esquive vapeur');
    return true;
  }
  if (!DamageSystem.tryHit(target)) {
    events.push({ type: 'EVADED', targetId: target.id, targetSide: findWhichFighter(target.id) });
    return true;
  }
  return false;
}

function offensiveHitChance(actor, baseAccuracy = 1) {
  const drunkPenalty = StatusSystem.hasStatus(actor, 'drunk') ? 0.2 : 0;
  return Math.max(0.05, Math.min(1, baseAccuracy - drunkPenalty));
}

function rollOffensiveAccuracy(actor, events, baseAccuracy = 1, label = 'attaque') {
  const chance = offensiveHitChance(actor, baseAccuracy);
  if (Math.random() < chance) return true;
  const drunkMiss = StatusSystem.hasStatus(actor, 'drunk');
  events.push({ type: 'INFO', message: drunkMiss ? `${actor.name} rate ${label} sous l'ivresse.` : `${actor.name} rate ${label}.` });
  return false;
}

function tryReflectByPolyglotte(actor, target, damage, family, events, message, caption = 'Polyglotte') {
  if (!StatusSystem.hasStatus(target, 'reflect_next')) return false;
  StatusSystem.removeStatus(target, 'reflect_next');
  if (Math.random() >= 0.5) {
    queueStatusEvent(events, target, 'reflect_next', 'Polyglotte manqué', `${target.name} rate son renvoi.`, 'technique', 'Polyglotte');
    return false;
  }
  queueStatusEvent(events, target, 'reflect_next', 'Polyglotte dissipé', `${target.name} détourne l'attaque.`, 'technique', 'Polyglotte');
  let reflectedDamage = applyFragileIfNeeded(actor, damage, events);
  reflectedDamage = DamageSystem.applyDefense(actor, reflectedDamage, events);
  actor.currentHp = Math.max(0, actor.currentHp - reflectedDamage);
  events.push({
    type: 'DAMAGE',
    value: reflectedDamage,
    targetId: actor.id,
    targetSide: findWhichFighter(actor.id),
    critical: false,
    family,
    caption,
    message: message || `${target.name} renvoie l'attaque : ${actor.name} subit ${reflectedDamage} dégâts.`
  });
  return true;
}

window.resolveBasicAttack = function resolveBasicAttack(actor, target, events) {
  if (!rollOffensiveAccuracy(actor, events, 1, 'son attaque')) return;
  let damage = DamageSystem.calcBasicAttack(actor, target);
  const critical = DamageSystem.maybeCrit();
  if (critical) damage = DamageSystem.capDamage(Math.floor(damage * BALANCE.critMultiplier), null);
  if (tryReflectByPolyglotte(actor, target, damage, 'physical', events, `${target.name} renvoie l\'assaut : ${actor.name} subit ${damage} dégâts.`, 'Polyglotte')) return;
  if (tryEvadeOrReactive(target, events)) return;
  damage = applyFragileIfNeeded(target, damage, events);
  damage = consumeTastyMarkIfPresent(target, actor, damage, events);
  damage = DamageSystem.applyDefense(target, damage, events);
  target.currentHp = Math.max(0, target.currentHp - damage);
  events.push({
    type: 'DAMAGE', value: damage, targetId: target.id, targetSide: findWhichFighter(target.id), critical,
    family: 'physical',
    message: `${target.name} subit ${damage} dégâts.`
  });
};

window.resolveSkill = function resolveSkill(actor, target, skillId, mode, events) {
  const skill = SKILLS[skillId];
  if (!skill) {
    events.push({ type: 'INFO', message: 'Compétence inconnue.' });
    return false;
  }

  if (skill.condition?.hpPercentMax) {
    const hpPercent = (actor.currentHp / actor.stats.hpMax) * 100;
    if (hpPercent > skill.condition.hpPercentMax) {
      events.push({ type: 'INFO', message: 'La condition n\'est pas remplie.' });
      return false;
    }
  }

  switch (skill.kind) {
    case 'physicalHeavy': {
      if (!rollOffensiveAccuracy(actor, events, skill.accuracy || 1, skill.name)) return true;
      let damage = DamageSystem.calcPhysical(actor, target, skill.damage, skill);
      damage = Math.floor(damage * consumeChargeIfPresent(actor, events));
      const critical = DamageSystem.maybeCrit();
      if (critical) damage = DamageSystem.capDamage(Math.floor(damage * BALANCE.critMultiplier), skill);
      if (tryReflectByPolyglotte(actor, target, damage, skill.family, events, `${target.name} retourne la frappe : ${actor.name} subit ${damage} dégâts.`, skill.name)) return true;
      if (!skill.ignoresEvade && tryEvadeOrReactive(target, events)) return true;
      damage = applyFragileIfNeeded(target, damage, events);
      damage = consumeTastyMarkIfPresent(target, actor, damage, events);
      damage = DamageSystem.applyDefense(target, damage, events);
      target.currentHp = Math.max(0, target.currentHp - damage);
      events.push({
        type: 'DAMAGE', value: damage, targetId: target.id, targetSide: findWhichFighter(target.id), critical,
        family: skill.family,
        message: `${target.name} subit ${damage} dégâts.`
      });
      return true;
    }

    case 'buff': {
      applyTimedModifier(actor, skill.buff, 'buff', events);
      if (skill.grantsCharge) {
        StatusSystem.addOrRefreshStatus(actor, 'charge', { duration: 3, skipTickOnce: true, family: 'technique' });
        queueStatusEvent(events, actor, 'charge', 'Charge', `${actor.name} prépare un impact renforcé.`, 'technique');
      }
      return true;
    }

    case 'transform': {
      if (actor.flags.usedTransformation) {
        events.push({ type: 'INFO', message: 'Transformation déjà utilisée.' });
        return false;
      }
      const oldHp = actor.currentHp;
      const base = CHARACTERS.nate;
      actor.id = 'nate';
      actor.name = base.name;
      actor.role = base.role;
      actor.desc = base.desc;
      actor.colors = { ...base.colors };
      actor.stats = { ...base.stats };
      actor.skills = [...base.skills];
      actor.currentHp = Math.min(oldHp, Math.floor(CHARACTERS.axel.stats.hpMax * 0.25));
      actor.flags.usedTransformation = true;
      actor.flags.turnsAsNate = 0;
      events.push({ type: 'TRANSFORM', actorId: actor.id, actorSide: findWhichFighter(actor.id), message: 'Axel se transforme en Nate.' });
      return true;
    }

    case 'debuff': {
      if (skill.target === 'enemy' && !rollOffensiveAccuracy(actor, events, skill.accuracy || 1, skill.name)) return true;
      applyTimedModifier(target, skill.debuff, 'debuff', events);
      if (skill.appliesFragile) {
        StatusSystem.addOrRefreshStatus(target, 'fragile', { duration: 3, skipTickOnce: false, family: 'technique' });
        queueStatusEvent(events, target, 'fragile', 'Fragilité', `${target.name} devient fragile.`, 'technique');
      }
      return true;
    }

    case 'multi': {
      if (!rollOffensiveAccuracy(actor, events, skill.accuracy || 1, skill.name)) return true;
      for (let i = 0; i < skill.hits; i += 1) {
        if (isDead(target)) break;
        let damage = DamageSystem.calcPhysical(actor, target, skill.damage, null);
        const critical = DamageSystem.maybeCrit();
        if (critical) damage = DamageSystem.capDamage(Math.floor(damage * BALANCE.critMultiplier), null);
        if (tryReflectByPolyglotte(actor, target, damage, skill.family, events, `${target.name} détourne la rafale : ${actor.name} subit ${damage} dégâts.`, skill.name)) break;
        if (tryEvadeOrReactive(target, events)) break;
        damage = applyFragileIfNeeded(target, damage, events);
        damage = DamageSystem.applyDefense(target, damage, events);
        target.currentHp = Math.max(0, target.currentHp - damage);
        events.push({
          type: 'DAMAGE', value: damage, targetId: target.id, targetSide: findWhichFighter(target.id), critical,
          family: skill.family,
          message: `${target.name} subit ${damage} dégâts.`
        });
      }
      return true;
    }

    case 'random': {
      const roll = Math.floor(Math.random() * 5);
      if (roll === 0) {
        const heal = BALANCE.osmozeHeal;
        actor.currentHp = Math.min(actor.stats.hpMax, actor.currentHp + heal);
        events.push({ type: 'HEAL', targetId: actor.id, targetSide: findWhichFighter(actor.id), value: heal, caption: 'Canalisation vitale', message: `${actor.name} récupère ${heal} PV.` });
        applyTimedModifier(actor, skill.healBuff, 'buff', events);
        return true;
      }
      if (roll === 1) {
        target.flags.skipNextTurn = true;
        events.push({ type: 'INFO', message: `${target.name} perdra son prochain tour.` });
        return true;
      }
      if (roll === 2) {
        actor.flags.extraTurn = true;
        events.push({ type: 'INFO', message: `${actor.name} gagne un tour bonus.` });
        applyTimedModifier(actor, skill.speedBuff, 'buff', events);
        return true;
      }
      if (roll === 3) {
        StatusSystem.addOrRefreshStatus(target, 'burn', { duration: 3, value: skill.burnValue || BALANCE.burnTick, skipTickOnce: true, family: 'magic' });
        queueStatusEvent(events, target, 'burn', 'Brûlure', `${target.name} prend feu.`, 'magic', 'Surchauffe');
        return true;
      }
      if (tryEvadeOrReactive(target, events)) return true;
      const magicFormula = skill.magicDamage || { scale: 2.4, base: 8 };
      let damage = DamageSystem.calcMagic(actor, target, magicFormula.scale, magicFormula.base, null);
      damage = applyFragileIfNeeded(target, damage, events);
      damage = consumeTastyMarkIfPresent(target, actor, damage, events);
      damage = DamageSystem.applyDefense(target, damage, events);
      target.currentHp = Math.max(0, target.currentHp - damage);
      events.push({ type: 'DAMAGE', value: damage, targetId: target.id, targetSide: findWhichFighter(target.id), critical: false, family: 'magic', message: `${target.name} subit ${damage} dégâts magiques.` });
      applyTimedModifier(target, skill.mindDebuff, 'debuff', events);
      return true;
    }

    case 'poisonAttack': {
      if (!rollOffensiveAccuracy(actor, events, skill.accuracy || 1, skill.name)) return true;
      let damage = DamageSystem.calcPhysical(actor, target, skill.damage, null);
      if (tryReflectByPolyglotte(actor, target, damage, 'technique', events, `${target.name} retourne l\'empoisonnement : ${actor.name} subit ${damage} dégâts.`, skill.name)) return true;
      if (tryEvadeOrReactive(target, events)) return true;
      damage = applyFragileIfNeeded(target, damage, events);
      damage = consumeTastyMarkIfPresent(target, actor, damage, events);
      damage = DamageSystem.applyDefense(target, damage, events);
      target.currentHp = Math.max(0, target.currentHp - damage);
      events.push({ type: 'DAMAGE', value: damage, targetId: target.id, targetSide: findWhichFighter(target.id), critical: false, family: 'technique', message: `${target.name} subit ${damage} dégâts.` });
      if (!isDead(target)) {
        StatusSystem.addOrRefreshStatus(target, 'poison', { value: BALANCE.poisonTick, family: 'technique' });
        queueStatusEvent(events, target, 'poison', 'Poison', `${target.name} est empoisonné.`, 'technique');
      }
      return true;
    }

    case 'mimi': {
      if (mode === 'self') {
        const heal = BALANCE.mimiSelfHeal;
        actor.currentHp = Math.min(actor.stats.hpMax, actor.currentHp + heal);
        StatusSystem.addOrRefreshStatus(actor, 'drunk', { duration: 1, skipTickOnce: true, family: 'technique' });
        events.push({ type: 'HEAL', targetId: actor.id, targetSide: findWhichFighter(actor.id), value: heal, caption: 'Mimi sur soi', message: `${actor.name} boit Mimi et récupère ${heal} PV.` });
        queueStatusEvent(events, actor, 'drunk', 'Ivresse', `${actor.name} entre en ivresse pour 1 tour.`, 'technique', 'Mimi');
        return true;
      }
      if (actor.flags.usedEnemyMimi) {
        events.push({ type: 'INFO', message: 'Mimi sur l\'ennemi a déjà été utilisée.' });
        return false;
      }
      actor.flags.usedEnemyMimi = true;
      target.flags.skipNextTurn = true;
      queueStatusEvent(events, target, 'skip', 'Tour perdu', `${target.name} perdra son prochain tour.`, 'technique');
      return true;
    }

    case 'dice': {
      if (!rollOffensiveAccuracy(actor, events, 1, skill.name)) return true;
      const variance = 0.75 + Math.random() * 0.5;
      const formula = { scale: BALANCE.attackScale * variance, base: BALANCE.attackBase };
      let damage = DamageSystem.calcPhysical(actor, target, formula, null);
      if (tryReflectByPolyglotte(actor, target, damage, skill.family, events, `${target.name} retourne les dés : ${actor.name} subit ${damage} dégâts.`, skill.name)) return true;
      if (tryEvadeOrReactive(target, events)) return true;
      damage = applyFragileIfNeeded(target, damage, events);
      damage = consumeTastyMarkIfPresent(target, actor, damage, events);
      damage = DamageSystem.applyDefense(target, damage, events);
      target.currentHp = Math.max(0, target.currentHp - damage);
      events.push({ type: 'DAMAGE', value: damage, targetId: target.id, targetSide: findWhichFighter(target.id), critical: false, family: skill.family, message: `${target.name} subit ${damage} dégâts.` });
      return true;
    }

    case 'magicDrain': {
      if (!rollOffensiveAccuracy(actor, events, 1, skill.name)) return true;
      let damage = DamageSystem.calcMagic(actor, target, skill.damage.scale, skill.damage.base, skill);
      if (!skill.ignoresCharge) damage = Math.floor(damage * consumeChargeIfPresent(actor, events));
      if (tryReflectByPolyglotte(actor, target, damage, 'magic', events, `${target.name} détourne le drain : ${actor.name} subit ${damage} dégâts magiques.`, skill.name)) return true;
      if (tryEvadeOrReactive(target, events)) return true;
      damage = applyFragileIfNeeded(target, damage, events);
      damage = consumeTastyMarkIfPresent(target, actor, damage, events);
      damage = DamageSystem.applyDefense(target, damage, events);
      target.currentHp = Math.max(0, target.currentHp - damage);
      const heal = Math.max(1, Math.min(skill.healCap || Number.MAX_SAFE_INTEGER, Math.floor(damage * skill.lifestealRatio)));
      actor.currentHp = Math.min(actor.stats.hpMax, actor.currentHp + heal);
      events.push({ type: 'DAMAGE', value: damage, targetId: target.id, targetSide: findWhichFighter(target.id), critical: false, family: 'magic', caption: 'Drain kosmique', message: `${target.name} subit ${damage} dégâts magiques.` });
      events.push({ type: 'HEAL', targetId: actor.id, targetSide: findWhichFighter(actor.id), value: heal, caption: 'Vol de vie', message: `${actor.name} récupère ${heal} PV.` });
      return true;
    }

    case 'magicBlast': {
      if (!rollOffensiveAccuracy(actor, events, 1, skill.name)) return true;
      let damage = DamageSystem.calcMagic(actor, target, skill.damage.scale, skill.damage.base, skill);
      if (!skill.ignoresCharge) damage = Math.floor(damage * consumeChargeIfPresent(actor, events));
      if (tryReflectByPolyglotte(actor, target, damage, 'magic', events, `${target.name} renvoie l\'impact magique : ${actor.name} subit ${damage} dégâts.`, skill.name)) return true;
      if (tryEvadeOrReactive(target, events)) return true;
      damage = applyFragileIfNeeded(target, damage, events);
      damage = consumeTastyMarkIfPresent(target, actor, damage, events);
      damage = DamageSystem.applyDefense(target, damage, events);
      target.currentHp = Math.max(0, target.currentHp - damage);
      events.push({ type: 'DAMAGE', value: damage, targetId: target.id, targetSide: findWhichFighter(target.id), critical: false, family: 'magic', caption: skill.actionCaption || 'Impulsion magique', message: `${target.name} subit ${damage} dégâts magiques.` });
      if (skill.debuff) applyTimedModifier(target, skill.debuff, 'debuff', events);
      if (skill.appliesFragile) {
        StatusSystem.addOrRefreshStatus(target, 'fragile', { duration: 3, skipTickOnce: false, family: 'magic' });
        queueStatusEvent(events, target, 'fragile', 'Fragilité', `${target.name} devient fragile.`, 'magic');
      }
      if (skill.skipNextTurnChance && Math.random() < skill.skipNextTurnChance) {
        target.flags.skipNextTurn = true;
        queueStatusEvent(events, target, 'skip', 'Tour perdu', `${target.name} perdra son prochain tour.`, 'magic');
      }
      return true;
    }

    case 'debtStrike': {
      if (!rollOffensiveAccuracy(actor, events, 1, skill.name)) return true;
      const strongest = Math.max(getEffectiveStat(target, 'force'), getEffectiveStat(target, 'agility'), getEffectiveStat(target, 'intelligence'));
      let damage = DamageSystem.capDamage(Math.max(1, Math.round(strongest * (skill.damage?.multiplier || 1.5) + (skill.damage?.base || 0))), skill);
      if (tryReflectByPolyglotte(actor, target, damage, 'magic', events, `${target.name} retourne la sentence : ${actor.name} subit ${damage} dégâts.`, skill.name)) return true;
      if (tryEvadeOrReactive(target, events)) return true;
      damage = applyFragileIfNeeded(target, damage, events);
      damage = consumeTastyMarkIfPresent(target, actor, damage, events);
      damage = DamageSystem.applyDefense(target, damage, events);
      target.currentHp = Math.max(0, target.currentHp - damage);
      events.push({ type: 'DAMAGE', value: damage, targetId: target.id, targetSide: findWhichFighter(target.id), critical: false, family: 'magic', caption: skill.actionCaption || 'Dette', message: `${target.name} subit ${damage} dégâts calculés sur sa meilleure stat.` });
      return true;
    }

    case 'fetidWave': {
      if (!rollOffensiveAccuracy(actor, events, 1, skill.name)) return true;
      let damage = DamageSystem.capDamage(
        Math.max(1, Math.floor(getEffectiveStat(actor, 'intelligence') * (skill.damage?.intScale || 1.5) + getEffectiveStat(actor, 'agility') * (skill.damage?.agiScale || 0.5) + (skill.damage?.base || 0))),
        skill
      );
      if (tryReflectByPolyglotte(actor, target, damage, 'magic', events, `${target.name} repousse la puanteur : ${actor.name} subit ${damage} dégâts.`, skill.name)) return true;
      if (tryEvadeOrReactive(target, events)) return true;
      damage = applyFragileIfNeeded(target, damage, events);
      damage = consumeTastyMarkIfPresent(target, actor, damage, events);
      damage = DamageSystem.applyDefense(target, damage, events);
      target.currentHp = Math.max(0, target.currentHp - damage);
      events.push({ type: 'DAMAGE', value: damage, targetId: target.id, targetSide: findWhichFighter(target.id), critical: false, family: 'magic', caption: skill.actionCaption || 'Vague puante', message: `${target.name} subit ${damage} dégâts magiques.` });
      if (skill.debuff) applyTimedModifier(target, skill.debuff, 'debuff', events);
      return true;
    }

    case 'reflectNext': {
      StatusSystem.addOrRefreshStatus(actor, 'reflect_next', { duration: skill.status?.duration || 1, skipTickOnce: true, family: skill.status?.family || 'technique' });
      queueStatusEvent(events, actor, 'reflect_next', 'Polyglotte', `${actor.name} préparera un renvoi de dégâts.`, 'technique', skill.name);
      return true;
    }

    case 'bloodMagic': {
      const selfDamage = Math.max(1, Math.floor(actor.stats.hpMax * (skill.selfDamageRatio || 0.1)));
      actor.currentHp = Math.max(0, actor.currentHp - selfDamage);
      events.push({ type: 'DAMAGE', value: selfDamage, targetId: actor.id, targetSide: findWhichFighter(actor.id), critical: false, family: 'technique', caption: 'Contrecoup', message: `${actor.name} sacrifie ${selfDamage} PV.` });
      if (!rollOffensiveAccuracy(actor, events, 1, skill.name)) return true;
      let damage = DamageSystem.calcMagic(actor, target, skill.damage.scale, skill.damage.base, skill);
      if (tryReflectByPolyglotte(actor, target, damage, 'magic', events, `${target.name} détourne la fumée noire : ${actor.name} subit ${damage} dégâts.`, skill.name)) return true;
      if (!skill.ignoresEvade && tryEvadeOrReactive(target, events)) return true;
      damage = applyFragileIfNeeded(target, damage, events);
      damage = consumeTastyMarkIfPresent(target, actor, damage, events);
      damage = DamageSystem.applyDefense(target, damage, events);
      target.currentHp = Math.max(0, target.currentHp - damage);
      events.push({ type: 'DAMAGE', value: damage, targetId: target.id, targetSide: findWhichFighter(target.id), critical: false, family: 'magic', caption: skill.name, message: `${target.name} subit ${damage} dégâts magiques.` });
      return true;
    }


    case 'halfHealOnce': {
      if (actor.flags.usedFlunch) {
        events.push({ type: 'INFO', message: `${actor.name} a déjà mangé au Flunch.` });
        return false;
      }
      actor.flags.usedFlunch = true;
      const heal = Math.max(1, Math.floor(actor.stats.hpMax * 0.5));
      actor.currentHp = Math.min(actor.stats.hpMax, actor.currentHp + heal);
      events.push({ type: 'HEAL', targetId: actor.id, targetSide: findWhichFighter(actor.id), value: heal, caption: skill.name, message: `${actor.name} récupère ${heal} PV.` });
      return true;
    }

    case 'sacrificeBurst': {
      if (!rollOffensiveAccuracy(actor, events, 1, skill.name)) return true;
      let damage = Math.max(1, Math.floor(actor.currentHp * 0.5));
      if (tryReflectByPolyglotte(actor, target, damage, 'magic', events, `${target.name} renvoie l'explosion : ${actor.name} se consume tout seul.`, skill.name)) {
        actor.currentHp = 0;
        return true;
      }
      if (tryEvadeOrReactive(target, events)) {
        actor.currentHp = 0;
        events.push({ type: 'INFO', message: `${actor.name} explose dans le vide.` });
        return true;
      }
      damage = applyFragileIfNeeded(target, damage, events);
      damage = consumeTastyMarkIfPresent(target, actor, damage, events);
      damage = DamageSystem.applyDefense(target, damage, events);
      target.currentHp = Math.max(0, target.currentHp - damage);
      actor.currentHp = 0;
      events.push({ type: 'DAMAGE', value: damage, targetId: target.id, targetSide: findWhichFighter(target.id), critical: false, family: 'magic', caption: skill.name, message: `${target.name} subit ${damage} dégâts de l'explosion.` });
      events.push({ type: 'DAMAGE', value: 999, targetId: actor.id, targetSide: findWhichFighter(actor.id), critical: false, family: 'technique', caption: 'Sacrifice', message: `${actor.name} s'effondre après l'explosion.` });
      return true;
    }

    case 'replacementCountdown': {
      if (StatusSystem.hasStatus(actor, 'replacement_countdown')) {
        events.push({ type: 'INFO', message: 'Le compte à rebours est déjà lancé.' });
        return false;
      }
      StatusSystem.addOrRefreshStatus(actor, 'replacement_countdown', { duration: 9, skipTickOnce: false, family: 'technique' });
      queueStatusEvent(events, actor, 'replacement_countdown', 'Remplacement 9', `${actor.name} lance un compte à rebours de 9 tours.`, 'technique', skill.name);
      return true;
    }

    case 'dualBuff': {
      (skill.buffs || []).forEach(effect => applyTimedModifier(actor, effect, 'buff', events));
      return true;
    }

    case 'healEnemyMark': {
      const heal = Math.max(1, Math.floor(getEffectiveStat(actor, 'force') * 1.5));
      target.currentHp = Math.min(target.stats.hpMax, target.currentHp + heal);
      events.push({ type: 'HEAL', targetId: target.id, targetSide: findWhichFighter(target.id), value: heal, caption: skill.name, message: `${target.name} récupère ${heal} PV.` });
      StatusSystem.addOrRefreshStatus(target, 'tasty_mark', { duration: 2, skipTickOnce: false, family: 'technique', meta: { multiplier: 2, sourceId: actor.id } });
      queueStatusEvent(events, target, 'tasty_mark', 'Tasty x2', `${target.name} prendra des dégâts doublés au prochain impact.`, 'technique', skill.name);
      return true;
    }

    case 'alchemy': {
      const alchemyMode = mode || (appState.battle.mode === 'arena' ? 'break' : 'fire');
      if (alchemyMode === 'fire') {
        if (appState.battle.mode === 'arena') {
          events.push({ type: 'INFO', message: 'En arène, Alchimie ne peut pas lancer de boule de feu.' });
          return false;
        }
        if (!rollOffensiveAccuracy(actor, events, 0.92, 'Boule de feu')) return true;
        let damage = DamageSystem.calcMagic(actor, target, 1.18, 6, { exceptionalCap: 44 });
        if (tryReflectByPolyglotte(actor, target, damage, 'magic', events, `${target.name} renvoie la boule de feu : ${actor.name} subit ${damage} dégâts.`, 'Boule de feu')) return true;
        if (tryEvadeOrReactive(target, events)) return true;
        damage = applyFragileIfNeeded(target, damage, events);
        damage = consumeTastyMarkIfPresent(target, actor, damage, events);
        damage = DamageSystem.applyDefense(target, damage, events);
        target.currentHp = Math.max(0, target.currentHp - damage);
        StatusSystem.addOrRefreshStatus(target, 'burn', { duration: 2, value: BALANCE.burnTick, family: 'magic' });
        queueStatusEvent(events, target, 'burn', 'Brûlure', `${target.name} brûle pendant 2 tours.`, 'magic', 'Boule de feu');
        events.push({ type: 'DAMAGE', value: damage, targetId: target.id, targetSide: findWhichFighter(target.id), critical: false, family: 'magic', caption: 'Boule de feu', message: `${target.name} subit ${damage} dégâts magiques.` });
        return true;
      }
      if (target.potionCount > 0) {
        target.potionCount = 0;
        queueStatusEvent(events, target, 'alchemy', 'Potion détruite', `${actor.name} détruit la potion de ${target.name}.`, 'technique', 'Alchimie');
      } else {
        events.push({ type: 'INFO', message: `${target.name} n'a plus de potion à détruire.` });
      }
      return true;
    }

    case 'steamEvade': {
      StatusSystem.addOrRefreshStatus(actor, 'evade_next', { duration: 1, skipTickOnce: true, family: 'magic' });
      queueStatusEvent(events, actor, 'evade_next', 'Vapeur', `${actor.name} préparera une esquive automatique.`, 'magic', 'Pression vapeur');
      return true;
    }

    default:
      events.push({ type: 'INFO', message: 'Effet non implémenté.' });
      return false;
  }
};

function tickGlobalCountdowns(events) {
  const battle = appState.battle;
  if (!battle) return false;
  const fighters = [battle.player, battle.enemy];
  for (const fighter of fighters) {
    const status = StatusSystem.getStatus(fighter, 'replacement_countdown');
    if (!status) continue;
    status.duration -= 1;
    if (status.duration > 0) {
      queueStatusEvent(events, fighter, 'replacement_countdown', `Remplacement ${status.duration}`, `${fighter.name} rapproche le remplacement final.`, 'technique', 'Compte à rebours');
      continue;
    }
    StatusSystem.removeStatus(fighter, 'replacement_countdown');
    battle.isEnded = true;
    battle.winnerId = fighter.id;
    events.push({ type: 'BATTLE_ENDED', actorId: fighter.id, actorSide: findWhichFighter(fighter.id), message: `${fighter.name} l'emporte grâce au Grand remplacement.` });
    return true;
  }
  return false;
}

window.finalizeTurn = function finalizeTurn(actor, target, events) {
  if (isDead(target)) {
    appState.battle.isEnded = true;
    appState.battle.winnerId = actor.id;
    events.push({ type: 'BATTLE_ENDED', actorId: actor.id, actorSide: findWhichFighter(actor.id), message: `${actor.name} remporte le combat.` });
    return;
  }

  StatusSystem.applyEndTurnEffects(actor, events, findWhichFighter(actor.id));
  StatusSystem.tickDurationsForTurnOwner(actor, events, findWhichFighter(actor.id));

  if (isDead(actor)) {
    appState.battle.isEnded = true;
    appState.battle.winnerId = target.id;
    events.push({ type: 'BATTLE_ENDED', actorId: target.id, actorSide: findWhichFighter(target.id), message: `${target.name} remporte le combat.` });
    return;
  }

  if (tickGlobalCountdowns(events)) return;

  if (actor.id === 'nate') {
    actor.flags.turnsAsNate += 1;
    if (actor.flags.turnsAsNate >= 2) {
      actor.currentHp = 0;
      appState.battle.isEnded = true;
      appState.battle.winnerId = target.id;
      events.push({ type: 'INFO', message: 'Nate s\'effondre après son déchaînement.' });
      events.push({ type: 'BATTLE_ENDED', actorId: target.id, actorSide: findWhichFighter(target.id), message: `${target.name} remporte le combat.` });
      return;
    }
  }

  if (actor.flags.extraTurn) {
    actor.flags.extraTurn = false;
    events.push({ type: 'INFO', message: `${actor.name} rejoue immédiatement.` });
    appState.battle.turnOwnerId = actor.id;
  } else {
    appState.battle.turnOwnerId = target.id;
    appState.battle.turnCount += 1;
  }

  events.push({
    type: 'TURN_CHANGED',
    actorId: appState.battle.turnOwnerId,
    actorSide: findWhichFighter(appState.battle.turnOwnerId)
  });
};

window.performAction = async function performAction(action) {
  if (appState.busy || appState.screen !== 'battle' || appState.battle.isEnded) return;
  const { actor, target } = getActorTarget(action.actorId, action.targetId);
  const opponent = appState.battle.player.id === actor.id ? appState.battle.enemy : appState.battle.player;
  const turnTarget = actor.id === target.id ? opponent : target;
  const actionSkill = action.type === 'skill' ? SKILLS[action.skillId] : null;
  const actionFamily = actionSkill?.family || (action.type === 'attack' ? 'physical' : action.type === 'defend' ? 'defense' : 'technique');
  const actionCaption = actionSkill?.actionCaption || (actionSkill?.signature ? `${actionSkill.name} — signature` : (action.label || `${actor.name} agit.`));
  const events = [{ type: 'ACTION_STARTED', actorId: actor.id, actorSide: findWhichFighter(actor.id), message: action.label || `${actor.name} agit.`, caption: actionCaption, family: actionFamily, signature: Boolean(actionSkill?.signature), skillName: actionSkill?.name || null, signatureText: actionSkill?.signatureLabel || null }];
  let actionSucceeded = true;
  DamageSystem.currentActorId = actor.id;

  if (actor.flags.skipNextTurn) {
    actor.flags.skipNextTurn = false;
    events.push({ type: 'INFO', message: `${actor.name} perd son tour.` });
    finalizeTurn(actor, turnTarget, events);
    DamageSystem.currentActorId = null;
    await FeedbackSystem.playEventSequence(events);
    if (appState.battle.isEnded) endBattle();
    return;
  }

  switch (action.type) {
    case 'attack':
      resolveBasicAttack(actor, target, events);
      break;
    case 'defend':
      actor.flags.defended = true;
      StatusSystem.addOrRefreshStatus(actor, 'guard', { duration: 1, skipTickOnce: true, family: 'defense' });
      events.push({ type: 'DEFEND_SET', actorSide: findWhichFighter(actor.id), message: `${actor.name} se met en défense.` });
      break;
    case 'potion':
      if (actor.potionCount <= 0) {
        actionSucceeded = false;
        events.push({ type: 'INFO', message: `${actor.name} n'a plus de potion.` });
      } else {
        actor.potionCount -= 1;
        const heal = (appState.battle.mode === 'campaign' || appState.battle.mode === 'endless')
          ? Math.max(0, actor.stats.hpMax - actor.currentHp)
          : Math.floor(actor.stats.hpMax * BALANCE.potionHealRatio);
        actor.currentHp = Math.min(actor.stats.hpMax, actor.currentHp + heal);
        events.push({ type: 'HEAL', targetId: actor.id, targetSide: findWhichFighter(actor.id), value: heal, caption: 'Potion', message: `${actor.name} récupère ${heal} PV.` });
      }
      break;
    case 'skill':
      actionSucceeded = resolveSkill(actor, target, action.skillId, action.mode, events);
      break;
    default:
      actionSucceeded = false;
      events.push({ type: 'INFO', message: 'Action inconnue.' });
      break;
  }

  if (actionSucceeded && action.consumesTurn !== false) {
    appState.battle.uiMode = 'main';
    finalizeTurn(actor, turnTarget, events);
  }

  DamageSystem.currentActorId = null;
  await FeedbackSystem.playEventSequence(events);
  if (appState.battle.isEnded) endBattle();
};

window.rollCampaignStatReward = function rollCampaignStatReward(playerState, amount = 1, source = 'reward') {
  const pool = ['force', 'agility', 'intelligence'];
  const stat = pool[Math.floor(Math.random() * pool.length)];
  if (!playerState.statBonuses) playerState.statBonuses = { force: 0, agility: 0, intelligence: 0 };
  playerState.statBonuses[stat] = (playerState.statBonuses[stat] || 0) + amount;
  return { stat, amount, source };
};

window.endBattle = function endBattle() {
  const battle = appState.battle;
  if (battle?.mode === 'campaign' && appState.campaign) {
    const campaign = appState.campaign;
    const won = battle.winnerId === battle.player.id;
    if (won) {
      const hpMaxGain = 3;
      const potionGain = battle.isBossEncounter ? 1 : 0;
      const statRewards = [];
      const currentClanId = campaign.currentClanId;
      const clanEncounters = campaign.clans[currentClanId] || [];
      const nextLocalIndex = campaign.currentClanStageIndex + 1;
      const clanCompleted = nextLocalIndex >= clanEncounters.length;
      campaign.playerState.simpleWins = campaign.playerState.simpleWins || 0;
      campaign.playerState.bossWins = campaign.playerState.bossWins || 0;
      campaign.playerState.maxHpBonus = campaign.playerState.maxHpBonus || 0;
      campaign.playerState.maxHpBonus += hpMaxGain;
      if (battle.isBossEncounter) {
        campaign.playerState.bossWins += 1;
        statRewards.push(rollCampaignStatReward(campaign.playerState, 1, 'boss'));
      } else {
        campaign.playerState.simpleWins += 1;
        if (campaign.playerState.simpleWins % 2 === 0) {
          statRewards.push(rollCampaignStatReward(campaign.playerState, 1, 'pair'));
        }
      }
      const refreshedStats = getPersistentPlayerStats(campaign.playerId, campaign.playerState);
      const heal = Math.floor(refreshedStats.hpMax * (battle.isBossEncounter ? 0.55 : 0.35));
      campaign.playerState = {
        ...campaign.playerState,
        id: campaign.playerId,
        currentHp: Math.min(refreshedStats.hpMax, battle.player.currentHp + hpMaxGain + heal),
        potionCount: Math.min(3, battle.player.potionCount + potionGain)
      };
      campaign.globalStageIndex += 1;
      if (clanCompleted) {
        campaign.completedClanIds.push(currentClanId);
        campaign.currentClanId = null;
        campaign.currentClanStageIndex = 0;
      } else {
        campaign.currentClanStageIndex = nextLocalIndex;
      }
      campaign.completed = campaign.globalStageIndex >= campaign.totalStages;
      campaign.failed = false;
      const nextEncounter = !campaign.completed && campaign.currentClanId
        ? campaign.clans[campaign.currentClanId][campaign.currentClanStageIndex]
        : null;
      const nextIsMap = !campaign.completed && !campaign.currentClanId;
      campaign.lastReward = {
        heal,
        hpMaxGain,
        potionGain,
        statRewards,
        clanLabel: battle.campaignClanLabel,
        nextStage: campaign.globalStageIndex + 1,
        nextIsMap,
        nextLabel: nextIsMap ? 'Choisir le prochain clan sur la carte.' : (nextEncounter?.label || ''),
        clanCompleted,
        remainingClanIds: [...campaign.remainingClanIds]
      };
    } else {
      campaign.failed = true;
      campaign.completed = false;
      campaign.lastReward = null;
    }
  }
  appState.screen = 'end';
  render();
};

window.getEnemyAction = function getEnemyAction() {
  return AISystem.chooseAction(appState.battle);
};

window.enemyTurn = async function enemyTurn() {
  if (appState.busy || appState.screen !== 'battle' || appState.battle.turnOwnerId !== appState.battle.enemy.id) return;
  await delay(380);
  await performAction(getEnemyAction());
};

render();


</script>

    const owned = new Set(state.playerState.itemIds || []);

  function applyItemAcquisition(state, itemId) {
    const item = getEndlessItem(itemId);
    if (!item) return null;
    if (!state.playerState.itemIds.includes(itemId)) state.playerState.itemIds.push(itemId);
    const stats = getPersistentPlayerStats(state.playerId, state.playerState);
    state.playerState.currentHp = Math.min(stats.hpMax, state.playerState.currentHp + Math.max(0, item.mods?.hpMax || 0));

  }

    const itemBonuses = getEndlessItemBonuses(state.playerState);
    const chance = (isBoss ? 0.50 : 0.05) + (itemBonuses.lootBonusFlat || 0) + (isBoss ? (itemBonuses.bossLootBonusFlat || 0) : 0);
    if (Math.random() >= chance) return null;
    if (Math.random() < 0.5) {

      state.playerState.potionCount = Math.min(maxPotions, state.playerState.potionCount + 1);

    if (outcome.damage) {
      const amount = endlessRandomInt(outcome.damage[0], outcome.damage[1]);
      state.playerState.currentHp = Math.max(1, state.playerState.currentHp - amount);
      applied.push(`-${amount} PV`);
    }
    if (outcome.potion) {
      state.playerState.potionCount = Math.min(getEndlessMaxPotions(state.playerState), state.playerState.potionCount + outcome.potion);
      applied.push(`+${outcome.potion} potion`);
    }
    if (outcome.itemChance && Math.random() < outcome.itemChance) {
      const itemId = pickRandomItemReward(state);
      if (itemId) {
        const item = applyItemAcquisition(state, itemId);
        applied.push(`objet: ${item.name}`);
      }
    }
    return applied;
  }

  window.resolveEndlessEvent = function resolveEndlessEvent(choiceIndex) {
    const endless = appState.endless;
    const event = endless?.pendingEvent;
    if (!endless || !event) return;
    const choice = event.choices[choiceIndex];
    if (!choice) return;
    let success = true;
    let text = '';
    let applied = [];
    if (choice.check) {
      const statValue = getEndlessEventStat(endless, choice.check);
      const chance = Math.max(0.12, Math.min(0.9, 0.45 + (statValue - choice.difficulty) * 0.06));
      success = Math.random() < chance;
      const outcome = success ? choice.success : choice.fail;
      text = outcome?.text || '';
      applied = applyEndlessEventOutcome(endless, outcome);
    } else {
      text = choice.fixed?.text || '';
      applied = applyEndlessEventOutcome(endless, choice.fixed);
    }
    endless.playerState.currentHp = Math.min(getPersistentPlayerStats(endless.playerId, endless.playerState).hpMax, endless.playerState.currentHp);
    endless.playerState.currentHp = Math.max(1, endless.playerState.currentHp);
    endless.lastEventResult = {
      title: event.title,
      result: success ? 'Succès' : 'Échec',
      text,
      applied
    };
    endless.pendingEvent = null;
    appState.screen = 'endlessHub';
    render();
  };

  window.buyEndlessStock = function buyEndlessStock(entryId) {
    const endless = appState.endless;
    if (!endless) return;
    const mods = getEndlessItemBonuses(endless.playerState);
    let price = 5;
    let label = 'Potion';
    if (entryId !== 'shop_potion') {
      const item = getEndlessItem(entryId);
      if (!item) return;
      price = item.cost;
      label = item.name;
    }
    price = Math.max(1, Math.round(price * (1 - (mods.shopDiscountPct || 0))));
    if (endless.playerState.gold < price) return;
    endless.playerState.gold -= price;
    if (entryId === 'shop_potion') {
      endless.playerState.potionCount = Math.min(getEndlessMaxPotions(endless.playerState), endless.playerState.potionCount + 1);
    } else {
      applyItemAcquisition(endless, entryId);
      endless.shopStock = endless.shopStock.filter(id => id !== entryId);
    }
    endless.lastShopNote = `${label} acheté pour ${price} or.`;
    render();
  };

      const won = battle.winnerId === battle.player.id;
      if (won) {
        const itemBonuses = getEndlessItemBonuses(endless.playerState);
        let gold = battle.isBossEncounter ? endlessRandomInt(5, 10) + (itemBonuses.bossGoldFlat || 0) : endlessRandomInt(1, 3);
        gold = Math.max(0, Math.round(gold * (1 + (itemBonuses.goldBonusPct || 0))));
        endless.playerState.gold += gold;
        endless.playerState.maxHpBonus = (endless.playerState.maxHpBonus || 0) + 2;
        const refreshedStats = getPersistentPlayerStats(endless.playerId, endless.playerState);
        const heal = Math.floor(refreshedStats.hpMax * 0.15);
        endless.playerState.currentHp = Math.min(refreshedStats.hpMax, Math.max(1, battle.player.currentHp) + 2 + heal);
        endless.playerState.potionCount = Math.min(getEndlessMaxPotions(endless.playerState), battle.player.potionCount);
        const loot = maybeRollEndlessLoot(endless, battle.isBossEncounter);
        endless.stageIndex += 1;
        if (battle.isBossEncounter) {
          endless.fightsSinceBoss = 0;
          endless.nextBossAt = endlessRandomInt(4, 6);
        } else {
          endless.fightsSinceBoss += 1;
        }
        endless.pendingEvent = Math.random() < (1 / 3) ? generateEndlessEvent(endless) : null;
        endless.shopStock = buildEndlessShopStock(endless);
        endless.lastRewards = { gold, heal, loot, nextBossIn: Math.max(0, endless.nextBossAt - endless.fightsSinceBoss) };
        endless.failed = false;
        appState.screen = 'endlessHub';
        render();
        return;
      }
      endless.failed = true;
      appState.screen = 'end';
      render();
      return;
    }
    oldEndBattle();
  };


  const AudioSystem = {
    ctx: null,
    master: null,
    musicTimer: null,
    ambientNodes: [],
    currentScene: '',
    unlocked: false,

    ensure() {
      if (this.ctx) return this.ctx;
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      this.ctx = new AC();
      this.master = this.ctx.createGain();
      this.master.gain.value = 0.15;
      this.master.connect(this.ctx.destination);
      return this.ctx;
    },

    async unlock() {
      const ctx = this.ensure();
      if (!ctx) return;
      if (ctx.state === 'suspended') {
        try { await ctx.resume(); } catch (e) {}
      }
      this.unlocked = ctx.state === 'running';
      if (this.unlocked) this.syncScene();
    },

    clearAmbient() {
      if (this.musicTimer) {
        clearInterval(this.musicTimer);
        this.musicTimer = null;
      }
      this.ambientNodes.forEach(node => {
        try { node.stop && node.stop(); } catch (e) {}
        try { node.disconnect && node.disconnect(); } catch (e) {}
      });
      this.ambientNodes = [];
    },

    sceneKey() {
      if (appState.screen === 'title') return 'menu-title';
      if (appState.screen === 'select' || appState.screen === 'campaignMap' || appState.screen === 'endlessHub' || appState.screen === 'endlessShop' || appState.screen === 'endlessEvent') return 'menu-select';
      if ((appState.screen === 'battle' || appState.screen === 'end') && appState.battle) return `combat-${appState.battle.arena || 'citadel'}`;
      return 'menu-title';
    },

    syncScene() {
      const ctx = this.ensure();
      if (!ctx || ctx.state !== 'running') return;
      const key = this.sceneKey();
      if (key === this.currentScene) return;
      this.currentScene = key;
      this.clearAmbient();
      if (key === 'menu-title') this.playEpicMenu(1.0);
      else if (key === 'menu-select') this.playEpicMenu(0.8);
      else if (key === 'combat-forge') this.playBiome('forge');
      else if (key === 'combat-swamp') this.playBiome('swamp');
      else this.playBiome('citadel');
    },

    makeTone(freq, start, dur, type, gain, attack, release, destination) {
      const ctx = this.ctx;
      if (!ctx) return null;
      if (!(isFinite(freq) && isFinite(start) && isFinite(dur))) return null;
      const osc = ctx.createOscillator();
      const amp = ctx.createGain();
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, start);
      amp.gain.setValueAtTime(0.0001, start);
      amp.gain.exponentialRampToValueAtTime(Math.max(0.0001, gain || 0.02), start + (attack || 0.02));
      amp.gain.exponentialRampToValueAtTime(0.0001, start + dur + (release || 0.08));
      osc.connect(amp);
      amp.connect(destination || this.master);
      osc.start(start);
      osc.stop(start + dur + (release || 0.08) + 0.02);
      this.ambientNodes.push(osc, amp);
      return osc;
    },

    makeNoise(start, dur, gain, highpassFreq) {
      const ctx = this.ctx;
      if (!ctx) return;
      const buffer = ctx.createBuffer(1, Math.max(1, Math.floor(ctx.sampleRate * dur)), ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i += 1) data[i] = (Math.random() * 2 - 1) * 0.35;
      const src = ctx.createBufferSource();
      src.buffer = buffer;
      const filter = ctx.createBiquadFilter();
      filter.type = 'highpass';
      filter.frequency.value = highpassFreq || 400;
      const amp = ctx.createGain();
      amp.gain.setValueAtTime(0.0001, start);
      amp.gain.exponentialRampToValueAtTime(Math.max(0.0001, gain || 0.01), start + 0.01);
      amp.gain.exponentialRampToValueAtTime(0.0001, start + dur);
      src.connect(filter);
      filter.connect(amp);
      amp.connect(this.master);
      src.start(start);
      src.stop(start + dur + 0.01);
      this.ambientNodes.push(src, filter, amp);
    },

    playEpicMenu(intensity) {
      const ctx = this.ctx;
      if (!ctx) return;
      const seqA = [220, 246.94, 293.66, 329.63];
      const seqB = [440, 493.88, 587.33, 659.25];
      const bassType = intensity > 0.9 ? 'triangle' : 'sine';
      const playBar = () => {
        const now = ctx.currentTime + 0.02;
        seqA.forEach((f, i) => {
          this.makeTone(f, now + i * 0.7, 0.64, bassType, 0.020 * intensity, 0.03, 0.20);
          this.makeTone(seqB[i], now + i * 0.7 + 0.08, 0.32, 'triangle', 0.010 * intensity, 0.02, 0.14);
          this.makeTone(seqB[i] * 1.5, now + i * 0.7 + 0.22, 0.16, 'sine', 0.005 * intensity, 0.01, 0.10);
        });
        this.makeNoise(now, 0.18, 0.003 * intensity, 700);
      };
      playBar();
      this.musicTimer = setInterval(playBar, 2800);
    },

    playBiome(kind) {
      const ctx = this.ctx;
      if (!ctx) return;
      const recipes = {
        citadel: { bass:[174.61,196,233.08,196], lead:[349.23,392,466.16,392], noise:0.002, hp:900, type:'sine' },
        forge:   { bass:[110,123.47,130.81,146.83], lead:[220,246.94,261.63,293.66], noise:0.004, hp:500, type:'triangle' },
        swamp:   { bass:[98,110,116.54,130.81], lead:[196,220,233.08,261.63], noise:0.003, hp:300, type:'sawtooth' }
      };
      const r = recipes[kind] || recipes.citadel;
      const playBar = () => {
        const now = ctx.currentTime + 0.02;
        r.bass.forEach((f, i) => {
          this.makeTone(f, now + i * 0.9, 0.82, r.type, 0.018, 0.03, 0.24);
          this.makeTone(r.lead[i], now + i * 0.9 + 0.18, 0.26, 'triangle', 0.008, 0.02, 0.12);
        });
        this.makeNoise(now + 0.1, 0.28, r.noise, r.hp);
      };
      playBar();
      this.musicTimer = setInterval(playBar, 3600);
    },

    playAction(kind) {
      const ctx = this.ensure();
      if (!ctx || ctx.state !== 'running') return;
      const now = ctx.currentTime + 0.005;
      if (kind === 'physical') {
        this.makeTone(120, now, 0.08, 'square', 0.030, 0.002, 0.06);
        this.makeNoise(now, 0.05, 0.010, 1200);
      } else if (kind === 'magic') {
        this.makeTone(660, now, 0.11, 'triangle', 0.018, 0.01, 0.12);
        this.makeTone(990, now + 0.03, 0.08, 'sine', 0.012, 0.01, 0.10);
      } else if (kind === 'defense') {
        this.makeTone(240, now, 0.10, 'triangle', 0.016, 0.005, 0.10);
        this.makeTone(360, now + 0.02, 0.08, 'triangle', 0.010, 0.005, 0.08);
      } else if (kind === 'heal') {
        this.makeTone(523.25, now, 0.10, 'sine', 0.014, 0.01, 0.14);
        this.makeTone(659.25, now + 0.05, 0.12, 'sine', 0.012, 0.01, 0.14);
      } else {
        this.makeTone(310, now, 0.07, 'square', 0.013, 0.004, 0.08);
        this.makeTone(465, now + 0.03, 0.07, 'triangle', 0.010, 0.004, 0.08);
      }
    }
  };
  window.AudioSystem = AudioSystem;
  window.addEventListener('pointerdown', () => AudioSystem.unlock(), { passive: true });
  window.addEventListener('keydown', () => AudioSystem.unlock(), { passive: true });

  const oldRenderPatched = window.render;
  window.render = function renderWithAudio() {
    const out = oldRenderPatched();
    AudioSystem.syncScene();
    return out;
  };

  const oldPlayEventSequence = FeedbackSystem.playEventSequence.bind(FeedbackSystem);
  FeedbackSystem.playEventSequence = async function(events) {
    const actionStart = (events || []).find(ev => ev.type === 'ACTION_STARTED');
    const healEvent = (events || []).find(ev => ev.type === 'HEAL');
    if (actionStart) {
      let kind = actionStart.family || 'technique';
      const text = `${actionStart.message || ''} ${actionStart.skillName || ''}`.toLowerCase();
      if (text.includes('potion') || text.includes('soin')) kind = 'heal';
      AudioSystem.playAction(kind);
    } else if (healEvent) {
      AudioSystem.playAction('heal');
    }
    return oldPlayEventSequence(events);
  };

  render();
})();
</script>
